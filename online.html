<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiceChess Online</title>
  <style>
    :root {
      --bg-1: #071221;
      --bg-2: #02070f;
      --panel: #101827;
      --panel-2: #111827;
      --line: rgba(255,255,255,.10);
      --blue: #2d7cff;
      --blue-2: #1565ff;
      --gold: #ffd54a;
      --text-dim: #b8c7d9;
      --red: #b33645;
      --white-cell: #EBECD0;
      --black-cell: #739552;
      --board-size: min(80vmin, 480px);
      --cell-size: calc(var(--board-size) / 8);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: linear-gradient(var(--bg-1), var(--bg-2));
      color: white;
      font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
    }

    .screen {
      display: none;
      min-height: 100dvh;
    }

    .screen.active {
      display: flex;
    }

    /* HOME */
    #match-home {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .online-title {
      text-align: center;
      margin-bottom: 20px;
    }

    .online-title .logo {
      font-size: 24px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: .4px;
    }

    .online-title h1 {
      margin: 12px 0 6px;
      font-size: 42px;
      letter-spacing: 3px;
      color: #fff;
    }

    .online-title p {
      margin: 0;
      font-size: 18px;
      color: #aaa;
    }

    .rating-box {
      width: 100%;
      max-width: 320px;
      background: var(--panel);
      border: 2px solid var(--blue);
      border-radius: 18px;
      padding: 18px;
      text-align: center;
      margin-bottom: 24px;
      box-shadow: 0 0 25px rgba(0, 120, 255, .3);
    }

    .rating-title {
      color: #6fb8ff;
      font-size: 18px;
    }

    #my-rate {
      margin-top: 8px;
      font-size: 52px;
      font-weight: 800;
    }

    .find-btn {
      width: 100%;
      max-width: 320px;
      height: 72px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      background: linear-gradient(#4ca3ff, #1565ff);
      color: white;
      font-size: 26px;
      font-weight: 800;
      box-shadow: 0 0 30px rgba(0, 100, 255, .45);
      transition: .2s;
    }

    .find-btn:active { transform: scale(.96); }

    .find-btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .info-box {
      width: 100%;
      max-width: 320px;
      margin-top: 10px;
      background: var(--panel-2);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      font-size: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .info-row:last-child { border-bottom: none; }

    .info-row span:last-child { color: #fff; font-weight: 700; }

    .back-link {
      margin-top: 20px;
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 15px;
    }

    /* MATCHING */
    #matching-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .matching-content {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .matching-content h1 {
      margin: 0;
      letter-spacing: 2px;
      font-size: 34px;
    }

    .player-card {
      width: 100%;
      max-width: 320px;
      border: 2px solid #4aa7ff;
      border-radius: 22px;
      background: rgba(255, 255, 255, .05);
      padding: 16px;
      margin: 6px 0;
      text-align: center;
      box-shadow: 0 0 20px rgba(74, 167, 255, .12);
    }

    .question {
      width: 90px;
      height: 90px;
      margin: auto;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 60px;
      font-weight: 800;
      color: var(--gold);
    }

    .vs-circle {
      width: 80px;
      height: 80px;
      margin: 10px auto;
      border-radius: 50%;
      border: 4px dotted var(--gold);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 34px;
      font-weight: 800;
      color: white;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .searching {
      margin: 4px 0;
      color: var(--text-dim);
      font-size: 15px;
    }

    .cancel {
      width: 100%;
      max-width: 320px;
      margin-top: 8px;
      padding: 14px;
      border: none;
      border-radius: 18px;
      background: var(--red);
      color: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
    }

    .name {
      margin-top: 10px;
      font-size: 22px;
      font-weight: 800;
    }

    .rate {
      margin-top: 6px;
      color: var(--gold);
      font-size: 18px;
    }

    /* GAME */
    #game-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
      gap: 12px;
    }

    .player-wrapper {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      padding: 10px 16px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,.08);
      gap: 12px;
    }

    .player-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 0;
      flex: 1;
    }

    .player-name {
      font-size: 1.15rem;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .player-rate {
      font-size: 1rem;
      color: var(--gold);
    }

    .player-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .chess-clock {
      width: 120px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      font-family: monospace;
      flex: 0 0 auto;
    }

    #board {
      border-collapse: collapse;
      border: 2px solid #222;
      width: var(--board-size);
      height: var(--board-size);
      aspect-ratio: 1 / 1;
      table-layout: fixed;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }

    #board td {
      width: var(--cell-size);
      height: var(--cell-size);
      position: relative;
      perspective: 1000px;
      padding: 0;
      overflow: hidden;
    }

    #board td.white { background-color: var(--white-cell); }
    #board td.black { background-color: var(--black-cell); }
    #board td.selected { outline: 3px solid yellow; outline-offset: -3px; }

    #board.flipped {
      transform: rotate(180deg);
    }

    .dice {
      width: 90%;
      height: 90%;
      position: absolute;
      top: 5%;
      left: 5%;
      transform-style: preserve-3d;
      transform-origin: center;
      transition: transform 0.5s ease-in-out;
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #fff;
      border: 1px solid #aaa;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      backface-visibility: hidden;
    }

    .pip {
      width: 6px;
      height: 6px;
      background: #000;
      border-radius: 50%;
      margin: 2px;
    }

    .front  { transform: rotateY(0deg) translateZ(15px); }
    .back   { transform: rotateY(180deg) translateZ(15px); }
    .right  { transform: rotateY(90deg) translateZ(15px); }
    .left   { transform: rotateY(-90deg) translateZ(15px); }
    .top    { transform: rotateX(90deg) translateZ(15px); }
    .bottom { transform: rotateX(-90deg) translateZ(15px); }

    .dice.king {
      outline: 2px solid red;
      outline-offset: 1px;
      border-radius: 6px;
    }

    .ghost-wrapper {
      opacity: 0.5;
      transform: scale(0.5);
      filter: brightness(60%);
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 10;
      pointer-events: none;
    }

    .ghost-dice .face {
      border: 1px dashed #000;
    }

    .board-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 520px;
    }

    .resign-btn {
      width: 140px;
      padding: 12px;
      background: #b33645;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(179, 54, 69, 0.3);
    }

    .resign-btn:active { transform: scale(.97); }

    .status-line {
      color: #b8c7d9;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .hidden { display: none !important; }

    .inline-panel {
      width: min(100%, 520px);
      background: #1e293b;
      color: white;
      padding: 22px 18px;
      border-radius: 20px;
      text-align: center;
      border: 2px solid #2d7cff;
      box-shadow: 0 18px 60px rgba(0,0,0,.5);
      white-space: pre-line;
      margin-top: 4px;
    }

    .inline-panel .panel-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: .5px;
    }

    .inline-panel .panel-message {
      font-size: 16px;
      line-height: 1.5;
      color: #e2e8f0;
      margin-bottom: 14px;
    }

    .inline-panel .panel-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .inline-panel .panel-actions button {
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 800;
      min-width: 96px;
    }

    .btn-blue { background: #2d7cff; color: white; }
    .btn-red { background: #b33645; color: white; }
    .btn-gray { background: #475569; color: white; }

    .menu-toggle {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      gap: 4px;
      position: absolute;
      right: 16px;
      top: 16px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .online-title h1 { font-size: 30px; }
      #my-rate { font-size: 42px; }
      .find-btn { height: 62px; font-size: 22px; }
      .chess-clock { width: 104px; font-size: 24px; padding: 8px 12px; }
      #board { width: min(88vmin, 380px); height: min(88vmin, 380px); }
      .pip { width: 4px; height: 4px; margin: 1px; }
      .dice { width: 95%; height: 95%; top: 2.5%; left: 2.5%; }
      .player-wrapper { padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <div id="match-home" class="screen active">
    <div class="online-title">
      <div class="logo">🎲 DiceChess</div>
      <h1>ONLINE MATCH</h1>
      <p>Play against players around the world.</p>
    </div>

    <div class="rating-box">
      <div class="rating-title">🏆 YOUR RATING</div>
      <div id="my-rate">1200</div>
    </div>

    <button id="match-button" class="find-btn">▶ FIND MATCH</button>

    <div class="info-box">
      <div class="info-row"><span>⏱ Time</span><span>10 min</span></div>
      <div class="info-row"><span>🌍 Online</span><span id="online-count">0</span></div>
      <div class="info-row"><span>⌛ Wait</span><span>&lt;10 sec</span></div>
    </div>

    <button id="back-button" class="back-link">← BACK</button>
  </div>

  <div id="matching-screen" class="screen">
    <div class="matching-content">
      <h1>MATCHING</h1>
      <p>Finding the perfect opponent...</p>

      <div class="player-card you">
        <div class="name" id="matching-playerName">YOU</div>
        <div class="rate" id="matching-playerRate">1200</div>
      </div>

      <div class="vs-circle">VS</div>

      <p class="searching" id="matching-text">Searching for player around your rating...</p>

      <div class="player-card opponent">
        <div class="question">?</div>
        <div class="name" id="matching-opponentName">???</div>
        <div class="rate" id="matching-opponentRate">????</div>
      </div>

      <button class="cancel" id="cancel-match">✕ CANCEL</button>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="player-wrapper">
      <div class="player-info">
        <span class="player-name" id="opponentName">???</span>
        <span class="player-rate" id="opponentRate">???</span>
      </div>
      <img src="./blank-profile-picture-973460_640.png" alt="Opponent Icon" class="player-icon" />
      <div id="opponent-clock" class="chess-clock">10:00</div>
    </div>

    <div class="board-shell">
      <table id="board" aria-label="DiceChess board"></table>
      <audio id="dice-roll-sound" src="./roll.mp3" preload="auto"></audio>
      <div id="game-status" class="status-line"></div>

      <div id="result-panel" class="inline-panel hidden">
        <div id="result-title" class="panel-title"></div>
        <div id="result-detail" class="panel-message"></div>
        <div class="panel-actions">
          <button id="result-home" class="btn-blue">ホームへ戻る</button>
        </div>
      </div>

      <div id="resign-panel" class="inline-panel hidden">
        <div class="panel-title">投了しますか？</div>
        <div class="panel-actions">
          <button id="resign-yes" class="btn-red">はい</button>
          <button id="resign-no" class="btn-gray">いいえ</button>
        </div>
      </div>

      <button id="resign-button" class="resign-btn">🏳️ resign</button>
    </div>

    <div class="player-wrapper">
      <div class="player-info">
        <span class="player-name" id="playerName">???</span>
        <span class="player-rate" id="playerRate">???</span>
      </div>
      <img src="./blank-profile-picture-973460_640.png" alt="Player Icon" class="player-icon" />
      <div id="player-clock" class="chess-clock">10:00</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDPN3x-mLFWOPzCo3X7pw91jNviJK9o9iM",
      authDomain: "dicechessapp-f1aae.firebaseapp.com",
      databaseURL: "https://dicechessapp-f1aae-default-rtdb.firebaseio.com",
      projectId: "dicechessapp-f1aae",
      storageBucket: "dicechessapp-f1aae.firebasestorage.app",
      messagingSenderId: "95867369126",
      appId: "1:95867369126:web:c48908ee53f03027fca667",
      measurementId: "G-Z4Z2HS0GMX"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const db2 = firebase.firestore();

    const sessionId = (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : `sess_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    let presenceRef = null;
    let connectedRef = null;
    let presenceCountRef = null;
    let presenceInitialized = false;

    const params = new URLSearchParams(location.search);
    let myname = params.get("myname") || `Guest_${Math.floor(Math.random() * 1000)}`;
    let roomid = null;
    let roomUnsub = null;
    let leavingRoom = false;
    let moveListener = null;
    let isMatched = false;
    let isCancelRequested = false;
    let matchTimer = null;
    let reverseColor = false;
    let finishedHandled = false;
    let room = null;
    let myRateLoaded = 1200;
    let matchmakingPollTimer = null;
    let currentPlayer = "white";
    let myColor = "white";
    let gameStarted = false;
    const SIZE = 8;
    const state = [];
    let selected = null;
    let ghostMoves = [];

    const board = document.getElementById("board");

    const diceRotations = {
      1: 'rotateX(0deg) rotateY(0deg)',
      2: 'rotateX(-90deg) rotateY(0deg)',
      3: 'rotateY(-90deg)',
      4: 'rotateY(90deg)',
      5: 'rotateX(90deg) rotateY(0deg)',
      6: 'rotateX(180deg) rotateY(0deg)'
    };

    const pipsMap = {
      1: [4],
      2: [0, 8],
      3: [0, 4, 8],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8]
    };

    function switchScreen(id) {
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function updateOnlineCount(count) {
      const el = document.getElementById("online-count");
      if (el) el.textContent = String(count);
    }

    function startOnlinePresence() {
      if (presenceInitialized) return;
      presenceInitialized = true;

      presenceRef = db.ref(`presence/${sessionId}`);
      connectedRef = db.ref(".info/connected");
      presenceCountRef = db.ref("presence");

      connectedRef.on("value", (snap) => {
        if (snap.val() === true) {
          presenceRef.set({
            name: myname,
            connectedAt: firebase.database.ServerValue.TIMESTAMP
          }).catch(() => {});
          presenceRef.onDisconnect().remove().catch(() => {});
        }
      });

      presenceCountRef.on("value", (snap) => {
        const users = snap.val() || {};
        updateOnlineCount(Object.keys(users).length);
      });
    }

    function formatTime(t) {
      t = Math.max(0, Math.floor(t));
      const m = Math.floor(t / 60);
      const s = Math.floor(t % 60);
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function showStatus(text) {
      document.getElementById("game-status").textContent = text || "";
    }

    function applyPerspective(room) {
      if (!room || isCancelRequested) return;
      myColor = room.name === myname ? "white" : "black";
      currentPlayer = myColor;
      board.classList.toggle("flipped", myColor === "black");
    }

    function showResultPanel(title, detail) {
      document.getElementById("result-title").innerText = title;
      document.getElementById("result-detail").innerText = detail || "";
      document.getElementById("result-panel").classList.remove("hidden");
      document.getElementById("resign-panel").classList.add("hidden");
      showStatus(detail || "対局終了");
    }

    function hideResultPanel() {
      document.getElementById("result-panel").classList.add("hidden");
    }

    function showResignPanel() {
      document.getElementById("resign-panel").classList.remove("hidden");
      document.getElementById("result-panel").classList.add("hidden");
    }

    function hideResignPanel() {
      document.getElementById("resign-panel").classList.add("hidden");
    }

    async function returnHome() {
      hideResultPanel();
      hideResignPanel();
      await leaveRoomAndGoHome();
    }

    document.getElementById("result-home").onclick = returnHome;

    function clearMatchTimers() {
      if (matchTimer) {
        clearTimeout(matchTimer);
        matchTimer = null;
      }
      if (matchmakingPollTimer) {
        clearInterval(matchmakingPollTimer);
        matchmakingPollTimer = null;
      }
    }

    function stopRoomListeners() {
      if (roomUnsub) {
        roomUnsub.off();
        roomUnsub = null;
      }
      if (moveListener) {
        moveListener.off();
        moveListener = null;
      }
    }

    async function leaveRoomAndGoHome() {
      if (leavingRoom) return;
      leavingRoom = true;
      isCancelRequested = true;
      clearMatchTimers();
      stopRoomListeners();

      const currentRoomId = roomid;
      roomid = null;
      room = null;
      finishedHandled = false;
      selected = null;
      ghostMoves = [];

      if (currentRoomId) {
        try {
          await db.ref("rooms/" + currentRoomId).remove();
        } catch (e) {}
      }

      location.href = "./online.html?myname=" + encodeURIComponent(myname);
    }

    async function acknowledgeFinishedRoom(roomSnapshot) {
      if (!roomid || !roomSnapshot) return;
      const roomRef = db.ref("rooms/" + roomid);
      const ackField = roomSnapshot.name === myname ? "ackWhite" : "ackBlack";
      try {
        await roomRef.update({ [ackField]: true });
        const latest = (await roomRef.once("value")).val();
        if (latest && latest.status === "finished" && latest.ackWhite && latest.ackBlack) {
          setTimeout(() => {
            roomRef.remove().catch(() => {});
          }, 1500);
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function finishByResign(winner, loser) {
      if (!roomid) return;
      const roomRef = db.ref("rooms/" + roomid);
      try {
        await roomRef.update({
          winner,
          loser,
          status: "finished",
          finishedAt: Date.now(),
          ackWhite: false,
          ackBlack: false
        });
      } catch (e) {
        console.error(e);
      }
    }

    function calculateEloRating(Ra, Rb, result, K = 32) {
      const Ea = 1 / (1 + Math.pow(10, (Rb - Ra) / 400));
      return Math.round(Ra + K * (result - Ea));
    }

    function createPiece(top, color, player, isKing = false) {
      let die;
      switch (top) {
        case 1: die = { top: 1, bottom: 6, left: 4, right: 3, front: 2, back: 5 }; break;
        case 2: die = { top: 2, bottom: 5, left: 4, right: 3, front: 6, back: 1 }; break;
        case 3: die = { top: 3, bottom: 4, left: 6, right: 1, front: 2, back: 5 }; break;
        case 4: die = { top: 4, bottom: 3, left: 1, right: 6, front: 2, back: 5 }; break;
        case 5: die = { top: 5, bottom: 2, left: 4, right: 3, front: 1, back: 6 }; break;
        case 6: die = { top: 6, bottom: 1, left: 4, right: 3, front: 5, back: 2 }; break;
        default: throw new Error("Invalid top value");
      }
      if (player === "black") {
        [die.left, die.right] = [die.right, die.left];
        [die.front, die.back] = [die.back, die.front];
      }
      return { ...die, color, player, isKing };
    }

    function playDiceRollSound() {
      const audio = document.getElementById("dice-roll-sound");
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }
    }

    function rollDie(die, direction) {
      const d = { ...die };
      switch (direction) {
        case "up":
          d.top = die.back; d.bottom = die.front; d.front = die.top; d.back = die.bottom; break;
        case "down":
          d.top = die.front; d.bottom = die.back; d.front = die.bottom; d.back = die.top; break;
        case "left":
          d.top = die.right; d.bottom = die.left; d.left = die.top; d.right = die.bottom; break;
        case "right":
          d.top = die.left; d.bottom = die.right; d.left = die.bottom; d.right = die.top; break;
      }
      return d;
    }

    function moveDie(originalDie, dx, dy) {
      let die = { ...originalDie };
      const step = (dir, count) => { for (let i = 0; i < count; i++) die = rollDie(die, dir); };
      if (dy < 0) step("up", -dy);
      else if (dy > 0) step("down", dy);
      if (dx < 0) step("left", -dx);
      else if (dx > 0) step("right", dx);
      return die;
    }

    function setupBoard() {
      board.innerHTML = "";
      state.length = 0;
      for (let r = 0; r < SIZE; r++) {
        const row = [];
        const tr = document.createElement("tr");
        for (let c = 0; c < SIZE; c++) {
          const td = document.createElement("td");
          td.dataset.row = r;
          td.dataset.col = c;
          td.className = (r + c) % 2 === 0 ? "white" : "black";
          td.addEventListener("click", onCellClick);
          tr.appendChild(td);
          row.push(null);
        }
        board.appendChild(tr);
        state.push(row);
      }

      const backRank = [5, 3, 3, 6, 2, 3, 3, 5];
      const reversedBackRank = [...backRank].reverse();

      for (let i = 0; i < SIZE; i++) {
        state[7][i] = createPiece(backRank[i], "", "white", backRank[i] === 2);
        state[6][i] = createPiece(1, "", "white");
        state[0][i] = createPiece(reversedBackRank[i], "", "black", reversedBackRank[i] === 2);
        state[1][i] = createPiece(1, "", "black");
      }
      render();
    }

    function createDiceElement(piece, isGhost = false) {
      const wrapper = document.createElement("div");
      const dice = document.createElement("div");
      dice.className = "dice" + (piece.isKing ? " king" : "");
      dice.style.transform = diceRotations[piece.top];
      if (isGhost) {
        wrapper.className = "ghost-wrapper";
        dice.classList.add("ghost-dice");
      }

      ["front", "back", "right", "left", "top", "bottom"].forEach((side) => {
        const face = document.createElement("div");
        face.className = `face ${side}`;

        if (piece.isKing) {
          face.style.background = reverseColor
            ? (piece.player === "white" ? "#06c" : "#c00")
            : (piece.player === "white" ? "#c00" : "#06c");
        } else {
          let diceColor = piece.player === "white" ? "#fff" : "#222";
          if (reverseColor) diceColor = piece.player === "white" ? "#222" : "#fff";
          face.style.background = diceColor;
        }

        const faceNumberMap = { front: 1, back: 6, right: 3, left: 4, top: 2, bottom: 5 };
        const faceNum = faceNumberMap[side];
        pipsMap[faceNum].forEach(() => {
          const pip = document.createElement("div");
          pip.className = "pip";
          pip.style.backgroundColor = reverseColor
            ? (piece.player === "white" ? "#fff" : "#000")
            : (piece.player === "white" ? "#000" : "#fff");
          face.appendChild(pip);
        });
        dice.appendChild(face);
      });

      if (isGhost) {
        wrapper.appendChild(dice);
        return wrapper;
      }
      return dice;
    }

    function render() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const td = board.rows[r].cells[c];
          td.classList.remove("selected");
          td.innerHTML = "";
          const piece = state[r][c];
          if (piece) td.appendChild(createDiceElement(piece));
        }
      }

      ghostMoves.forEach(({ r, c, piece }) => {
        const td = board.rows[r].cells[c];
        td.appendChild(createDiceElement(piece, true));
      });

      if (selected) {
        const [sr, sc] = selected;
        const td = board.rows[sr].cells[sc];
        if (td) td.classList.add("selected");
      }
    }

    function getGhostMoves(piece, sr, sc) {
      if (!piece) return [];
      const moves = [];
      const directions = [
        { dr: -1, dc: 0 },
        { dr: 1, dc: 0 },
        { dr: 0, dc: -1 },
        { dr: 0, dc: 1 }
      ];
      directions.forEach(({ dr, dc }) => {
        for (let i = 1; i <= piece.top; i++) {
          const r = sr + dr * i;
          const c = sc + dc * i;
          if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) break;
          const target = state[r][c];
          const newDie = moveDie(piece, dc * i, dr * i);
          if (target) {
            if (target.player === piece.player) break;
            if (piece.top < target.top) moves.push({ r, c, piece: { ...piece, ...newDie } });
            break;
          } else {
            moves.push({ r, c, piece: { ...piece, ...newDie } });
          }
        }
      });
      return moves;
    }

    function hasBlockingPiece(sr, sc, er, ec, boardState) {
      const dr = Math.sign(er - sr);
      const dc = Math.sign(ec - sc);
      let r = sr + dr;
      let c = sc + dc;
      while (r !== er || c !== ec) {
        if (boardState[r][c]) return true;
        r += dr;
        c += dc;
      }
      return false;
    }

    function getBlockingPosition(sr, sc, dr, dc, boardState) {
      let r = sr + dr;
      let c = sc + dc;
      while (r >= 0 && r < 8 && c >= 0 && c < 8) {
        if (boardState[r][c]) return [r, c];
        r += dr;
        c += dc;
      }
      return [null, null];
    }

    function generateMoves(player, boardState) {
      const moves = [];
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const piece = boardState[r][c];
          if (!piece || piece.player !== player) continue;
          const dirs = [[1,0],[0,1],[-1,0],[0,-1]];
          for (const [dr, dc] of dirs) {
            for (let dist = 1; dist <= piece.top; dist++) {
              const nr = r + dr * dist;
              const nc = c + dc * dist;
              if (nr < 0 || nc < 0 || nr >= 8 || nc >= 8) break;
              const target = boardState[nr][nc];
              if (hasBlockingPiece(r, c, nr, nc, boardState)) {
                const [br, bc] = getBlockingPosition(r, c, dr, dc, boardState);
                const blocking = boardState[br][bc];
                if (blocking && blocking.player !== player && piece.top < blocking.top) {
                  moves.push({ from: [r, c], to: [br, bc] });
                }
                break;
              }
              if (target) {
                if (target.player === player) break;
                if (piece.top < target.top) moves.push({ from: [r, c], to: [nr, nc] });
                break;
              }
              moves.push({ from: [r, c], to: [nr, nc] });
            }
          }
        }
      }
      return moves;
    }

    function applyMove(boardState, move) {
      const [fr, fc] = move.from;
      const [tr, tc] = move.to;
      const piece = boardState[fr][fc];
      const dx = tc - fc;
      const dy = tr - fr;
      const newDie = moveDie(piece, dx, dy);
      boardState[tr][tc] = { ...piece, ...newDie };
      boardState[fr][fc] = null;
      return boardState;
    }

    function cloneBoard(boardState) {
      return boardState.map(row => row.map(cell => cell ? { ...cell } : null));
    }

    function isInCheckAfterMove(color, boardState) {
      let kingPosition = null;
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const piece = boardState[row][col];
          if (piece && piece.player === color && piece.isKing) {
            kingPosition = { row, col };
            break;
          }
        }
        if (kingPosition) break;
      }
      if (!kingPosition) return true;
      const opponent = color === "white" ? "black" : "white";
      const oppMoves = generateMoves(opponent, boardState);
      return oppMoves.some(move => move.to[0] === kingPosition.row && move.to[1] === kingPosition.col);
    }

    function isInCheck(color) {
      return isInCheckAfterMove(color, state);
    }

    function checkmate(color) {
      if (!isInCheck(color)) return false;
      const moves = generateMoves(color, state);
      for (const move of moves) {
        const newBoard = applyMove(cloneBoard(state), move);
        if (!isInCheckAfterMove(color, newBoard)) return false;
      }
      return true;
    }

    function checkWinner(boardState) {
      let hasWhiteKing = false, hasBlackKing = false;
      for (let row of boardState) {
        for (let piece of row) {
          if (piece?.isKing) {
            if (piece.player === "white") hasWhiteKing = true;
            if (piece.player === "black") hasBlackKing = true;
          }
        }
      }
      if (!hasWhiteKing) return "black";
      if (!hasBlackKing) return "white";
      return null;
    }

    function animateDiceMoveSmooth(diceElement, dx, dy, duration = 0.3) {
      return new Promise((resolve) => {
        const tileSize = board.getBoundingClientRect().width / 8;
        if ((dx === 0 && dy === 0) || duration <= 0) { resolve(); return; }

        const moveX = dx * tileSize;
        const moveY = dy * tileSize;
        const rotateX = dy === -1 ? 90 : dy === 1 ? -90 : 0;
        const rotateY = dx === 1 ? 90 : dx === -1 ? -90 : 0;

        const startX = parseFloat(diceElement.dataset.posX || "0");
        const startY = parseFloat(diceElement.dataset.posY || "0");
        const startRotateX = parseFloat(diceElement.dataset.rotateX || "0");
        const startRotateY = parseFloat(diceElement.dataset.rotateY || "0");

        const targetX = startX + moveX;
        const targetY = startY + moveY;
        const targetRotateX = startRotateX + rotateX;
        const targetRotateY = startRotateY + rotateY;

        diceElement.style.position = "absolute";
        const startTime = performance.now();

        function step(now) {
          const elapsed = (now - startTime) / 1000;
          const progress = Math.min(elapsed / duration, 1);
          const currentX = startX + (targetX - startX) * progress;
          const currentY = startY + (targetY - startY) * progress;
          const currentRotateX = startRotateX + (targetRotateX - startRotateX) * progress;
          const currentRotateY = startRotateY + (targetRotateY - startRotateY) * progress;
          diceElement.style.transform = `translate(${currentX}px, ${currentY}px) rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;
          if (progress < 1) requestAnimationFrame(step);
          else {
            diceElement.dataset.posX = targetX;
            diceElement.dataset.posY = targetY;
            diceElement.dataset.rotateX = targetRotateX;
            diceElement.dataset.rotateY = targetRotateY;
            diceElement.style.transform = `translate(${targetX}px, ${targetY}px) rotateX(${targetRotateX}deg) rotateY(${targetRotateY}deg)`;
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }

    async function animateMoveAndUpdateState(sr, sc, directions, piece) {
      let currentDie = { ...piece };
      let row = sr;
      let col = sc;
      for (const dir of directions) {
        const dr = dir === "up" ? -1 : dir === "down" ? 1 : 0;
        const dc = dir === "left" ? -1 : dir === "right" ? 1 : 0;
        const nr = row + dr;
        const nc = col + dc;
        const diceElem = board.rows[row].cells[col].querySelector(".dice");
        if (!diceElem) break;
        currentDie = rollDie(currentDie, dir);
        await animateDiceMoveSmooth(diceElem, dc, dr);
        playDiceRollSound();
        board.rows[row].cells[col].innerHTML = "";
        board.rows[nr].cells[nc].appendChild(diceElem);
        state[nr][nc] = { ...piece, ...currentDie };
        state[row][col] = null;
        render();
        row = nr;
        col = nc;
      }
      ghostMoves = [];
      selected = null;
      render();
    }

    async function isMyTurn() {
      if (!roomid) return false;
      const snap = await db.ref("rooms/" + roomid).once("value");
      const room = snap.val();
      if (!room) return false;
      return room.turn === myname;
    }

    async function sendMove(roomId, move) {
      const movesRef = db.ref(`rooms/${roomId}/moves`);
      await movesRef.push(move).catch(() => {});
      const roomRef = db.ref("rooms/" + roomId);
      const snap = await roomRef.once("value");
      room = snap.val();
      if (!room || isCancelRequested) return;
      const now = Date.now();
      const nextTurn = room.turn === room.name ? room.opponent : room.name;
      let updateData = { turn: nextTurn, lastMoveTime: now };

      let elapsed = 0;
      if (room.lastMoveTime !== 0) elapsed = Math.floor((now - room.lastMoveTime) / 1000);

      if (room.turn === room.name) {
        updateData.timeWhite = Math.max(0, room.timeWhite - elapsed);
        if (updateData.timeWhite <= 0) {
          updateData.winner = room.opponent;
          updateData.loser = room.name;
          updateData.status = "finished";
        }
      } else {
        updateData.timeBlack = Math.max(0, room.timeBlack - elapsed);
        if (updateData.timeBlack <= 0) {
          updateData.winner = room.name;
          updateData.loser = room.opponent;
          updateData.status = "finished";
        }
      }
      await roomRef.update(updateData);
      showStatus(`${nextTurn}のターン`);
    }

    function getRate(opponentName) {
      return Promise.all([
        db2.collection("users").where("name", "==", myname).get(),
        db2.collection("users").where("name", "==", opponentName).get()
      ]).then(([mySnap, oppSnap]) => {
        if (mySnap.empty || oppSnap.empty) return;
        const myDoc = mySnap.docs[0];
        const oppDoc = oppSnap.docs[0];
        const myRate = myDoc.data().rate || 1500;
        const oppRate = oppDoc.data().rate || 1500;
        myRateLoaded = myRate;
        document.getElementById("my-rate").innerText = myRate;
        document.getElementById("playerRate").innerText = myRate;
        document.getElementById("playerName").innerText = myname;
        document.getElementById("matching-playerRate").innerText = myRate;
        document.getElementById("matching-playerName").innerText = myname;
        document.getElementById("opponentRate").innerText = oppRate;
        document.getElementById("matching-opponentRate").innerText = oppRate;
        document.getElementById("matching-opponentName").innerText = opponentName;
      }).catch(err => console.error("Firestore読み込みエラー:", err));
    }

    async function refreshRoomAndClocks() {
      if (!roomid) return;
      const roomRef = db.ref("rooms/" + roomid);
      const snap = await roomRef.once("value");
      room = snap.val();
      if (!room || isCancelRequested) return;

      let white = room.timeWhite ?? 600;
      let black = room.timeBlack ?? 600;

      if (room.lastMoveTime && room.lastMoveTime !== 0 && room.status !== "finished") {
        const elapsed = (Date.now() - room.lastMoveTime) / 1000;
        if (room.turn === room.name) white -= elapsed;
        else if (room.turn === room.opponent) black -= elapsed;
      }
      white = Math.max(0, white);
      black = Math.max(0, black);

      const meIsHost = room.name === myname;
      const myTime = meIsHost ? white : black;
      const oppTime = meIsHost ? black : white;
      document.getElementById("player-clock").innerText = formatTime(myTime);
      document.getElementById("opponent-clock").innerText = formatTime(oppTime);

      if (room.status !== "finished" && (white <= 0 || black <= 0)) {
        const winner = white <= 0 ? room.opponent : room.name;
        const loser = white <= 0 ? room.name : room.opponent;
        if (winner && loser) await roomRef.update({ winner, loser, status: "finished" });
      }

      if (room.status === "finished" && room.winner && room.loser) {
        if (!finishedHandled && (myname === room.winner || myname === room.loser)) {
          finishedHandled = true;
          const opponentName = myname === room.winner ? room.loser : room.winner;
          const result = myname === room.winner ? 1 : 0;
          let showed = false;
          try {
            const [mySnap, oppSnap] = await Promise.all([
              db2.collection("users").where("name", "==", myname).get(),
              db2.collection("users").where("name", "==", opponentName).get()
            ]);
            if (!mySnap.empty && !oppSnap.empty) {
              const myDoc = mySnap.docs[0];
              const oppDoc = oppSnap.docs[0];
              const myRate = myDoc.data().rate || 1500;
              const oppRate = oppDoc.data().rate || 1500;
              const newRate = calculateEloRating(myRate, oppRate, result);
              await myDoc.ref.update({ rate: newRate });
              showResultPanel(result === 1 ? "勝利" : "敗北", `レート ${myRate} → ${newRate}`);
              showed = true;
            }
          } catch (e) {
            console.error(e);
          }
          if (!showed) {
            showResultPanel(result === 1 ? "勝利" : "敗北", "レート更新の取得に失敗しました");
          }
          await acknowledgeFinishedRoom(room);
        } else {
          await acknowledgeFinishedRoom(room);
        }
      }
    }

    async function listenForOpponentMove(myName, roomId) {
      if (moveListener) moveListener.off();
      moveListener = db.ref("rooms/" + roomId + "/moves");
      moveListener.limitToLast(1).on("child_added", snapshot => {
        const move = snapshot.val();
        if (!move || move.player === myName) return;
        applyOpponentMove(move.from, move.to, move.diceState);
      });
    }

    async function applyOpponentMove(from, to, diceState) {
      const sr = from.y;
      const sc = from.x;
      const tr = to.y;
      const tc = to.x;
      const piece = state[sr][sc];
      if (!piece) return;
      const dx = tc - sc;
      const dy = tr - sr;
      const directions = [];
      for (let i = 0; i < Math.abs(dx); i++) directions.push(dx > 0 ? "right" : "left");
      for (let i = 0; i < Math.abs(dy); i++) directions.push(dy > 0 ? "down" : "up");
      await animateMoveAndUpdateState(sr, sc, directions, piece);
      state[tr][tc] = { ...piece, ...diceState };
      state[sr][sc] = null;
      render();
      showStatus(`${myname}のターン`);
    }

    function reportVictoryReset(room) {
      if (!roomid || !room) return;
      db.ref("rooms/" + roomid).update({
        winner: "",
        loser: "",
        status: "waiting",
        name: "",
        turn: "",
        opponent: "",
        moves: "",
        timeWhite: 600,
        timeBlack: 600,
        lastMoveTime: 0
      }).catch(() => {});
    }

    function updateLocalPlayerLabels(room) {
      const meIsHost = room.name === myname;
      const opponentName = meIsHost ? room.opponent : room.name;
      document.getElementById("playerName").innerText = myname;
      document.getElementById("opponentName").innerText = opponentName || "???";
      if (opponentName) getRate(opponentName);
    }

    function attachRoomListener() {
      if (!roomid) return;
      const ref = db.ref("rooms/" + roomid);
      ref.off("value");
      ref.on("value", snap => {
        const room = snap.val();
        if (!room || isCancelRequested) return;
        if (room.status === "playing") {
          updateLocalPlayerLabels(room);
          applyPerspective(room);
          if (!document.getElementById("game-screen").classList.contains("active")) {
            switchScreen("game-screen");
          }
          if (!isMatched) {
            isMatched = true;
            clearTimeout(matchTimer);
            if (matchmakingPollTimer) {
              clearInterval(matchmakingPollTimer);
              matchmakingPollTimer = null;
            }
            document.getElementById("matching-text").textContent = "Match found!";
          }
          if (!gameStarted) {
            setupBoard();
            gameStarted = true;
          }
          showStatus(room.turn === myname ? "あなたのターン" : "相手のターン");
        } else if (room.status === "waiting") {
          if (room.opponent) {
            updateLocalPlayerLabels(room);
          }
        }
      });
    }

    async function getRandomWaitingRoom() {
      const snapshot = await db.ref("rooms").once("value");
      const allRooms = snapshot.val() || {};
      const waitingRooms = Object.entries(allRooms)
        .filter(([, value]) => value.status === "waiting" && value.name && value.name !== myname)
        .map(([id, value]) => ({ id, ...value }))
        .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      if (!waitingRooms.length) return null;
      return waitingRooms[0];
    }

    async function getOpponentName(roomId, myName) {
      const roomRef = db.ref("rooms/" + roomId);
      const snap = await roomRef.once("value");
      const room = snap.val();
      roomid = roomId;

      if (!room) return null;

      if (!room.name) {
        await roomRef.update({ name: myName, status: "waiting", turn: myName });
        return null;
      }

      if (!room.opponent && room.name !== myName) {
        await roomRef.update({ opponent: myName, status: "playing" });
      }

      const current = (await roomRef.once("value")).val();
      const opponentName = current.name === myName ? current.opponent : current.name;
      if (opponentName) {
        document.getElementById("opponentName").textContent = opponentName;
        await getRate(opponentName);
      }
      if (!document.getElementById("game-screen").classList.contains("active")) switchScreen("game-screen");
      attachRoomListener();
      listenForOpponentMove(myName, roomId);
      return opponentName;
    }

      matchTimer = setTimeout(() => {

        }).catch(() => {});

    async function findAndMatch() {
      const button = document.getElementById("match-button");
      button.disabled = true;
      button.style.opacity = "0.5";
      button.style.cursor = "not-allowed";
      switchScreen("matching-screen");
      document.getElementById("matching-playerName").textContent = myname;
      document.getElementById("matching-playerRate").textContent = String(myRateLoaded || 1200);
      document.getElementById("matching-opponentName").textContent = "???";
      document.getElementById("matching-opponentRate").textContent = "????";
      document.getElementById("matching-text").textContent = "Searching for player around your rating...";

      if (matchmakingPollTimer) {
        clearInterval(matchmakingPollTimer);
        matchmakingPollTimer = null;
      }

      const tryJoinWaitingRoom = async () => {
        const room = await getRandomWaitingRoom();
        if (!room) return false;
        if (roomid && room.id === roomid) return false;

        roomid = room.id;
        const roomRef = db.ref("rooms/" + roomid);
        const current = (await roomRef.once("value")).val();
        if (!current || current.status !== "waiting" || current.name === myname) return false;

        await roomRef.update({
          opponent: myname,
          status: "playing",
          lastMoveTime: Date.now(),
          turn: current.name,
          createdAt: current.createdAt || Date.now()
        });

        applyPerspective(current);
        if (!gameStarted) {
          setupBoard();
          gameStarted = true;
        }
        attachRoomListener();
        matched();
        const opponentName = current.name;
        document.getElementById("matching-opponentName").textContent = opponentName;
        document.getElementById("matching-opponentRate").textContent = "????";
        document.getElementById("opponentName").textContent = opponentName;
        await getRate(opponentName);
        switchScreen("game-screen");
        listenForOpponentMove(myname, roomid);
        return true;
      };

      if (await tryJoinWaitingRoom()) return;

      const newRoomRef = db.ref("rooms").push();
      roomid = newRoomRef.key;
      await newRoomRef.set({
        name: myname,
        opponent: "",
        status: "waiting",
        turn: myname,
        moves: "",
        winner: "",
        loser: "",
        timeWhite: 600,
        timeBlack: 600,
        lastMoveTime: 0,
        timeOverProcessed: false,
        createdAt: Date.now()
      });
      attachRoomListener();
      startMatchingTimer();

      const waitingRef = db.ref("rooms/" + roomid);
      waitingRef.on("value", async snap => {
        const room = snap.val();
        if (!room || isCancelRequested) return;
        if (isCancelRequested) return;
        if (room.opponent && room.status === "playing") {
          if (matchmakingPollTimer) {
            clearInterval(matchmakingPollTimer);
            matchmakingPollTimer = null;
          }
          clearTimeout(matchTimer);
          matched();
          switchScreen("game-screen");
          updateLocalPlayerLabels(room);
          if (!gameStarted) {
            setupBoard();
            gameStarted = true;
          }
          listenForOpponentMove(myname, roomid);
          waitingRef.off();
        }
      });

      matchmakingPollTimer = setInterval(async () => {
        if (!roomid) return;
        const currentRoom = (await db.ref("rooms/" + roomid).once("value")).val();
        if (currentRoom && currentRoom.status === "playing" && currentRoom.opponent) {
          clearInterval(matchmakingPollTimer);
          matchmakingPollTimer = null;
          return;
        }
        await tryJoinWaitingRoom();
      }, 1000);
    }

    async function onCellClick(e) {
      const row = parseInt(e.currentTarget.dataset.row, 10);
      const col = parseInt(e.currentTarget.dataset.col, 10);
      const cell = state[row][col];

      if (!roomid) return;
      const myTurn = await isMyTurn();
      if (!myTurn) return;

      if (!selected && cell && cell.player === myColor) {
        selected = [row, col];
        ghostMoves = getGhostMoves(cell, row, col);
        render();
        return;
      }

      if (!selected) return;

      const [sr, sc] = selected;
      const piece = state[sr][sc];
      const target = state[row][col];

      const dr = row - sr;
      const dc = col - sc;
      const isStraight = (dr === 0 || dc === 0);
      const distance = Math.max(Math.abs(dr), Math.abs(dc));
      const inRange = distance <= piece.top;

      if (!isStraight || !inRange) {
        selected = null;
        ghostMoves = [];
        render();
        return;
      }

      const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
      const stepC = dc === 0 ? 0 : dc / Math.abs(dc);
      let r = sr + stepR;
      let c = sc + stepC;
      let foundEnemy = null;

      while (r !== row || c !== col) {
        const mid = state[r][c];
        if (mid) {
          if (mid.player === piece.player) {
            selected = null; ghostMoves = []; render(); return;
          }
          if (foundEnemy) {
            selected = null; ghostMoves = []; render(); return;
          }
          foundEnemy = { ...mid, row: r, col: c };
        }
        r += stepR;
        c += stepC;
      }

      const dx = col - sc;
      const dy = row - sr;
      const newDie = moveDie(piece, dx, dy);
      const directions = [];
      for (let i = 0; i < Math.abs(dx); i++) directions.push(dx > 0 ? "right" : "left");
      for (let i = 0; i < Math.abs(dy); i++) directions.push(dy > 0 ? "down" : "up");

      const moveExecute = async () => {
        await animateMoveAndUpdateState(sr, sc, directions, piece);
        state[row][col] = { ...piece, ...newDie };
        state[sr][sc] = null;
        ghostMoves = [];
        selected = null;
        render();
        const move = {
          from: { y: sr, x: sc },
          to: { y: row, x: col },
          player: myname,
          diceState: newDie,
          timestamp: Date.now()
        };
        await sendMove(roomid, move);

        const winnerByKing = checkWinner(state);
        if (winnerByKing) {
          const me = myname;
          const meWon = (winnerByKing === (room ? (room.name === myname ? "white" : "black") : "white"));
        }
      };

      if (target && target.player !== piece.player && piece.top < target.top) {
        await moveExecute();
        const winColor = checkWinner(state);
        if (winColor) {
          const roomSnap = await db.ref("rooms/" + roomid).once("value");
          const room = roomSnap.val();
          if (room && room.status !== "finished") {
            const winner = winColor === "white" ? room.name : room.opponent;
            const loser = winColor === "white" ? room.opponent : room.name;
            if (winner && loser) await db.ref("rooms/" + roomid).update({ winner, loser, status: "finished" });
          }
        } else if (checkmate("black")) {
          const roomSnap = await db.ref("rooms/" + roomid).once("value");
          const room = roomSnap.val();
          if (room && room.status !== "finished") {
            await db.ref("rooms/" + roomid).update({ winner: room.name, loser: room.opponent, status: "finished" });
          }
        }
        return;
      }

      if (!target && !foundEnemy) {
        await moveExecute();
        return;
      }

      selected = null;
      ghostMoves = [];
      render();
    }

    async function listenClockLoop() {
      while (true) {
        try { await refreshRoomAndClocks(); } catch (e) {}
        await new Promise(r => setTimeout(r, 1000));
      }
    }

    document.getElementById("match-button").onclick = findAndMatch;
    document.getElementById("cancel-match").onclick = async () => {
      if (!roomid) {
        location.reload();
        return;
      }
      await leaveRoomAndGoHome();
    };
    document.getElementById("back-button").onclick = async () => {
      if (!roomid) {
        history.back();
        return;
      }
      document.getElementById("resign-modal").classList.remove("hidden");
    };

    document.getElementById("resign-button").onclick = () => showResignPanel();
    document.getElementById("resign-no").onclick = () => hideResignPanel();
    window.addEventListener("beforeunload", () => {
      try {
        if (presenceRef) presenceRef.remove();
      } catch (e) {}
    });

    document.getElementById("resign-yes").onclick = async () => {
      hideResignPanel();
      if (!roomid) return;
      const snap = await db.ref("rooms/" + roomid).once("value");
      room = snap.val();
      if (!room || isCancelRequested) return;
      const winner = room.name === myname ? room.opponent : room.name;
      await finishByResign(winner, myname);
      showStatus("対局終了。結果を反映中...");
    };

    async function init() {
      document.getElementById("playerName").innerText = myname;
      document.getElementById("matching-playerName").innerText = myname;
      document.getElementById("playerRate").innerText = "1200";
      document.getElementById("matching-playerRate").innerText = "1200";
      setupBoard();
      startOnlinePresence();
      try {
        const mySnap = await db2.collection("users").where("name", "==", myname).get();
        if (!mySnap.empty) {
          const rate = mySnap.docs[0].data().rate || 1500;
          myRateLoaded = rate;
          document.getElementById("my-rate").innerText = rate;
          document.getElementById("playerRate").innerText = rate;
          document.getElementById("matching-playerRate").innerText = rate;
        }
      } catch (e) {
        console.error(e);
      }
      setInterval(refreshRoomAndClocks, 1000);
    }

    init();
  </script>
