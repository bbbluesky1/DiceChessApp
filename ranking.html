<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiceChess ランキング</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-image: url('./space-art-5626853_640.jpg');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      color: white;
      margin-bottom: 1rem;
    }

    #ranking-list {
      width: 90%;
      max-width: 600px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      padding: 1rem;
    }

    .player-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #ddd;
    }

    .player-row:nth-child(even) {
      background-color: #f9f9f9;
    }

    .player-name {
      font-weight: bold;
      color: #555;
    }

    .player-rate {
      color: #00796B;
    }

    
header {
  position: static; /* fixed → staticに */
  width: 100%;
  height: 60px;
  background-color: #222;
  color: white;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 1000;
}

#back-button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  margin-right: 16px;
  cursor: pointer;
  user-select: none;
}

#back-button:active {
  opacity: 0.6;
}

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      margin: auto;
    }

    .menu-toggle {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      gap: 4px;
    }

    .menu-toggle div {
      width: 25px;
      height: 3px;
      background-color: #fff;
    }

    nav {
      position: absolute;
      top: 60px;
      right: 20px;
      background-color: #444;
      color: #fff;
      display: none;
      flex-direction: column;
      min-width: 150px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 1100;
    }

    nav a {
      padding: 0.8rem 1rem;
      text-decoration: none;
      color: #fff;
      border-bottom: 1px solid #555;
    }

    nav a:hover {
      background-color: #555;
    }

    body.show-menu nav {
      display: flex;
    }

  </style>
</head>
<body>
<header>
    <button id="back-button" aria-label="戻る">&larr;</button>
    <div class="logo">🎲 DiceChess</div>
    <div class="menu-toggle" onclick="document.body.classList.toggle('show-menu')">
      <div></div><div></div><div></div>
    </div>
    <nav>
      <a href="./index.html">Home</a>
      <a href="./bot.html">Bot対戦</a>
      <a href="./tutorial.html">ルール</a>
      <a href="./login.html">オンライン対戦</a>
      <a href="./ranking.html">ランキング</a>
      <a href="./tsumeshogi.html">詰将棋</a>
    </nav>
  </header>

  <h1>🎖️ プレイヤーランキング</h1>
  <div id="ranking-list">読み込み中...</div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>

document.getElementById('back-button').addEventListener('click', () => {
  window.history.back();  // ひとつ前のページに戻る（ブラウザ履歴）
});



     const firebaseConfig = {
    apiKey: "AIzaSyDPN3x-mLFWOPzCo3X7pw91jNviJK9o9iM",
    authDomain: "dicechessapp-f1aae.firebaseapp.com",
    databaseURL: "https://dicechessapp-f1aae-default-rtdb.firebaseio.com",
    projectId: "dicechessapp-f1aae",
    storageBucket: "dicechessapp-f1aae.firebasestorage.app",
    messagingSenderId: "95867369126",
    appId: "1:95867369126:web:c48908ee53f03027fca667",
    measurementId: "G-Z4Z2HS0GMX"
  };


    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadRanking() {
      const container = document.getElementById("ranking-list");
      try {
        const snapshot = await db.collection("users")
          .orderBy("rate", "desc")
          .limit(50)
          .get();

        if (snapshot.empty) {
          container.innerHTML = "<p>ランキングデータがありません。</p>";
          return;
        }

        container.innerHTML = "";
        snapshot.forEach((doc, index) => {
          const data = doc.data();
          const row = document.createElement("div");
          row.className = "player-row";
          row.innerHTML = `
            <div class="player-name">${index + 1}. ${data.name}</div>
            <div class="player-rate">${data.rate} pt</div>
          `;
          container.appendChild(row);
        });
      } catch (e) {
        console.error("ランキング取得失敗", e);
        container.innerHTML = "<p>ランキングの取得に失敗しました。</p>";
      }
    }

    loadRanking();
  </script>

</body>
</html>
