<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DiceChess - Select Bot</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #0b1220, #05060a);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    padding: 20px 12px;
  }

  .container {
    width: 100%;
    max-width: 860px;
    text-align: center;
  }

  .title {
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 30px;
    color: #cbd5e1;
  }

  .subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 34px;
  }

  .row {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .card {
    width: 170px;
    height: 220px;
    background: #111827;
    border: 2px solid #1f2937;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.2s;
    flex: 0 1 170px;
  }

  .card:hover {
    transform: scale(1.05);
    border-color: #38bdf8;
    box-shadow: 0 0 25px rgba(56,189,248,0.35);
  }

  .icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 15px;
    border: 2px solid #334155;
    background: #0f172a;
  }

  .icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .name {
    font-size: 15px;
    font-weight: bold;
  }

  .desc {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 6px;
  }

  .back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 18px;
    background: #1e293b;
    color: white;
    border: 1px solid #475569;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
    z-index: 10;
  }

  .back-btn:hover {
    background: #334155;
    border-color: #38bdf8;
  }

  @media (max-width: 600px) {
    body {
      padding: 72px 12px 18px;
      align-items: flex-start;
    }

    .title {
      font-size: 20px;
      margin-bottom: 18px;
    }

    .subtitle {
      margin-bottom: 22px;
    }

    .row {
      gap: 14px;
    }

    .card {
      width: min(44vw, 150px);
      height: 200px;
      flex-basis: min(44vw, 150px);
    }

    .icon {
      width: 68px;
      height: 68px;
    }

    .back-btn {
      top: 12px;
      left: 12px;
      padding: 9px 14px;
      font-size: 13px;
    }
  }

  @media (max-width: 380px) {
    .card {
      width: min(86vw, 250px);
      flex-basis: min(86vw, 250px);
    }
  }

</style>
</head>

<body>
<button class="back-btn" onclick="location.href='index.html'">
  ← 戻る
</button>
<div class="container">

  <div class="title">SELECT YOUR OPPONENT</div>
  <div class="subtitle">好きなボットを選択してください</div>

  <div class="row">

    <!-- BOT 1 -->
    <div class="card" onclick="location.href='bot_original.html'">
      <div class="icon">
        <img src="./human-5894669_640.jpg" alt="Diceman 01">
      </div>
      <div class="name">Bot1</div>
      <div class="desc">AI</div>
    </div>

    <!-- BOT 2 -->
    <div class="card" onclick="location.href='bot_ver2.html'">
      <div class="icon">
        <img src="./1780812408223 (1).png" alt="Diceman 02">
      </div>
      <div class="name">Bot2</div>
      <div class="desc">AI</div>
    </div>

    <!-- DICECHESS DEVELOPER -->
    <div class="card" onclick="location.href='botver3.html'">
      <div class="icon">
        <img src="./dicechess_developer_transparent.png" alt="DiceChess Developer">
      </div>
      <div class="name">DiceChess Developer</div>
      <div class="desc">AI</div>
    </div>

  </div>

</div>

</body>
</html>
