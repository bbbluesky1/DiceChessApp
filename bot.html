<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>DiceChess - Select Bot</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #0b1220, #05060a);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
  }

  .container {
    text-align: center;
  }

  .title {
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 30px;
    color: #cbd5e1;
  }

  .subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 40px;
  }

  .row {
    display: flex;
    gap: 40px;
    justify-content: center;
  }

  .card {
    width: 170px;
    height: 220px;
    background: #111827;
    border: 2px solid #1f2937;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.2s;
  }

  .card:hover {
    transform: scale(1.08);
    border-color: #38bdf8;
    box-shadow: 0 0 25px rgba(56,189,248,0.35);
  }

  /* ★ ここが変更ポイント */
  .icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 15px;
    border: 2px solid #334155;
  }

  .icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .name {
    font-size: 15px;
    font-weight: bold;
  }

  .desc {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 6px;
  }

</style>
</head>

<body>

<div class="container">

  <div class="title">SELECT YOUR OPPONENT</div>
  <div class="subtitle">好きなボットを選択してください</div>

  <div class="row">

    <!-- BOT 1 -->
    <div class="card" onclick="location.href='bot_original.html'">
      <div class="icon">
        <img src="./human-5894669_640.jpg" alt="Diceman 01">
      </div>
      <div class="name">Bot1</div>
      <div class="desc">AI</div>
    </div>

    <!-- BOT 2 -->
    <div class="card" onclick="location.href='bot_ver2.html'">
      <div class="icon">
        <img src="./1780812408223 (1).png" alt="Diceman 02">
      </div>
      <div class="name">Bot2</div>
      <div class="desc">AI</div>
    </div>

  </div>

</div>

</body>
</html>
