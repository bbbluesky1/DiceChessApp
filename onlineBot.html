    * { box-sizing: border-box; }

    html, body {

    body {

      min-height: 100dvh;

      flex-direction: column;

      overflow-y: auto;
    }

    body::before {

      flex: 0 0 auto;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }

    #back-button {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      margin-right: 16px;
      cursor: pointer;
      user-select: none;
      flex: 0 0 auto;
    }

    #back-button:active { opacity: 0.6; }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.35rem;
      font-weight: 800;
      margin: auto;
      white-space: nowrap;
    }

    .menu-toggle {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      gap: 4px;
      flex: 0 0 auto;
    }

    .menu-toggle div {
      width: 25px;
      height: 3px;
      background-color: #fff;
      border-radius: 999px;
    }

    nav {

      top: 60px;

      flex-direction: column;
      align-items: center;
      gap: 10px;

    .player-bar {

      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 10px 12px;

      align-items: center;
      justify-content: space-between;
      gap: 10px;

    .player-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .player-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,.9);
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
      flex: 0 0 auto;
      background: #222;
    }

    .emoji-avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
      object-fit: none;

    .emoji-avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      line-height: 1;

      color: #fff;
      user-select: none;
    }

    .player-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
      line-height: 1.15;
    }

    .player-name-line {
      font-size: 1.03rem;
      font-weight: 800;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-subline {
      margin-top: 3px;
      font-size: 0.74rem;
      letter-spacing: .12em;
      color: #cbd5e1;
    }

    #robot-bubble {
      margin-top: 4px;
      width: 100%;
      max-width: 300px;
      color: #dbeafe;
      font-size: 0.8rem;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      background: transparent;
      border: none;
      padding: 0;
      box-shadow: none;
      height: auto;
      position: static;
    }

    #robot-bubble::before { display: none; }

      color: #fff;
      font-size: 1.15rem;

      min-width: 0;
      flex: 0 0 auto;
      margin: 0;
      border-radius: 18px;
      overflow: visible;

    .dice {
      width: 90%;
      height: 90%;
      max-width: 100%;
      max-height: 100%;
      position: absolute;
      top: 5%;
      left: 5%;
      transform-style: preserve-3d;
      transform-origin: center;
      transition: transform 0.5s ease-in-out;
      border-radius: 6px;
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #fff;
      border: 1px solid #aaa;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .pip {
      width: 6px;
      height: 6px;
      background: #000;
      border-radius: 50%;
      margin: 2px;
    }

    .front  { transform: rotateY(0deg) translateZ(15px); }
    .back   { transform: rotateY(180deg) translateZ(15px); }
    .right  { transform: rotateY(90deg) translateZ(15px); }
    .left   { transform: rotateY(-90deg) translateZ(15px); }
    .top    { transform: rotateX(90deg) translateZ(15px); }
    .bottom { transform: rotateX(-90deg) translateZ(15px); }

    .dice.king {
      outline: 2px solid red;
      outline-offset: 1px;
    }

    .hidden { display: none!important; }

    .ghost-wrapper {
      opacity: 0.5;
      transform: scale(0.5);
      filter: brightness(60%);
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 10;
      pointer-events: none;

    .spinner {
      border: 4px solid #f3f3f3;

      border-radius: 50%;
      width: 30px;
      height: 30px;

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }

    .eval-mark {
      font-size: 18px;

    @media (max-width: 768px) {
      main#game-container {

        padding: 10px 10px 18px;

        border-radius: 16px;

        max-width: 100%;

        width: min(100%, 280px);
        font-size: 1rem;
      }

      .eval-mark {
        font-size: 12px;
        padding: 1px 2px;
      }
    }
  </style>

async function primeMyRate() {
  const myNameSafe = (myname || "").trim();

    cachedMyRateReady = true;
    return;
  }

  try {
    const snap = await db2.collection("users")
      .where("name", "==", myNameSafe)
      .limit(1)
      .get();

    }

  } finally {
    cachedMyRateReady = true;
  }
}

function calculateEloRating(Ra, Rb, result, K=32) {
  const Ea = 1 / (1 + Math.pow(10, (Rb - Ra) / 400));
  const newRa = Ra + K * (result - Ea);
  return Math.round(newRa);
}

function formatRateChange(before, after) {
  const diff = after - before;
  const sign = diff >= 0 ? "+" : "";
  return `レート ${before} → ${after} (${sign}${diff})`;
}

function persistMyRate(newRate) {
  const myNameSafe = (myname || "").trim();
  if (!myNameSafe) return;

  const usersRef = db2.collection("users");
  (async () => {
    try {
      const snap = await usersRef.where("name", "==", myNameSafe).limit(1).get();
      if (!snap.empty) {
        await snap.docs[0].ref.set({
          name: myNameSafe,
          rate: newRate
        }, { merge: true });
      } else {
        await usersRef.add({
          name: myNameSafe,
          rate: newRate
        });
      }
    } catch (err) {
      console.error("persistMyRate error:", err);
    }
  })();
}

async function updateBotElo(result){
  const botRate = 1500;
  const myRate = cachedMyRateReady ? cachedMyRate : 1500;
  const newRate = calculateEloRating(myRate, botRate, result);
  cachedMyRate = newRate;
  cachedMyRateReady = true;
  persistMyRate(newRate);
  return formatRateChange(myRate, newRate);
}

function showModal(message, finished=false) {
  const modal = document.getElementById("custom-modal");
  const msg = document.getElementById("modal-message");
  const btn = document.getElementById("match-button");

  if (msg) msg.textContent = message;
  if (btn) {
    btn.style.display = "block";
    btn.textContent = finished ? "マッチングに戻る" : "閉じる";
    btn.onclick = finished ? backToMatching : closeModal;
  }

  if (modal) {
    modal.classList.remove("hidden");
    modal.style.setProperty("display", "flex", "important");
    modal.style.setProperty("z-index", "2147483647", "important");
    modal.style.setProperty("position", "fixed", "important");
    modal.style.setProperty("inset", "0", "important");
  }
  document.body.style.overflow = "hidden";
}

  function closeModal() {
    const modal = document.getElementById("custom-modal");
    if (modal) {
      modal.classList.add("hidden");
      modal.style.display = "none";
    }
    document.body.style.overflow = "auto";
  }

function getMoveEvaluationMark(before, after) {
  const diff = before - after;
  if (diff >= 15) return { mark: "!!", color: "#AAF0D1" };        // パールグリーン
  if (diff >= 12) return { mark: "!",  color: "#87CEFA" };        // 青
  if (diff >= 9)  return { mark: "☆", color: "#98FB98" };         // 黄緑
  if (diff >= 6)  return { mark: "👍", color: "#98FB98" };         // 緑
  if (diff >= 3)  return { mark: "✅", color: "#90EE90" };         // 深緑
  if (diff > -3)  return { mark: "?!", color: "#FFFF99" };        // 黄色
  if (diff > -6)  return { mark: "?",  color: "#FFD580" };        // オレンジ
  if (diff > -9)  return { mark: "×",  color: "#FFB6C1" };        // 薄赤
  return              { mark: "??", color: "#FF0000" };           // 濃赤
}

function createPiece(top, color, player, isKing = false) {
  let die;

   switch (top) {
    case 1:
      die = { top: 1, bottom: 6, left: 4, right: 3, front: 2, back: 5 };
      break;
    case 2:
      die = { top: 2, bottom: 5, left: 4, right: 3, front: 6, back: 1 };
      break;
    case 3:
      die = { top: 3, bottom: 4, left: 6, right: 1, front: 2, back: 5 };
      break;
    case 4:
      die = { top: 4, bottom: 3, left: 1, right: 6, front: 2, back: 5 };
      break;
    case 5:
      die = { top: 5, bottom: 2, left: 4, right: 3, front: 1, back: 6 };
      break;
    case 6:
      die = { top: 6, bottom: 1, left: 4, right: 3, front: 5, back: 2 };
      break;
    default:
      throw new Error("Invalid top value");
  }

  // 黒なら左右・前後を反転
  if (player=="black") {
    [die.left, die.right] = [die.right, die.left];
    [die.front, die.back] = [die.back, die.front];
  }

  return { ...die, color, player, isKing };
}

function rollDie(die, direction) {
  const newDie = { ...die };

  switch (direction) {
    case "up":
      newDie.top = die.back;
      newDie.bottom = die.front;
      newDie.front = die.top;
      newDie.back = die.bottom;
      break;
    case "down":
      newDie.top = die.front;
      newDie.bottom = die.back;
      newDie.front = die.bottom;
      newDie.back = die.top;
      break;
    case "left":
      newDie.top = die.right;
      newDie.bottom = die.left;
      newDie.left = die.top;
      newDie.right = die.bottom;
      break;
    case "right":
      newDie.top = die.left;
      newDie.bottom = die.right;
      newDie.left = die.bottom;
      newDie.right = die.top;
      break;
  }

  return newDie;
}

function moveDie(originalDie, dx, dy) {
  let die = { ...originalDie };

  const step = (dir, count) => {
    for (let i = 0; i < count; i++) {
      die = rollDie(die, dir);
    }
  };

  if (dy < 0) step("up", -dy);
  else if (dy > 0) step("down", dy);

  if (dx < 0) step("left", -dx);
  else if (dx > 0) step("right", dx);

  return die;
}

function getGhostMoves(piece, sr, sc) {
  if (!piece) return [];

  const moves = [];
  const directions = [
    { dr: -1, dc: 0 }, // 上
    { dr: 1, dc: 0 },  // 下
    { dr: 0, dc: -1 }, // 左
    { dr: 0, dc: 1 }   // 右
  ];

  directions.forEach(({ dr, dc }) => {
    for (let i = 1; i <= piece.top; i++) {
      const r = sr + dr * i;
      const c = sc + dc * i; //
      if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) break;

      const target = state[r][c];
      const newDie = moveDie(piece, dc * i, dr * i);

      if (target) {
        if (target.player === piece.player) break;
            
        if (piece.top < target.top) {
          moves.push({ r, c, piece: { ...piece, ...newDie } });
        }
      
        break;
      } else {
        moves.push({ r, c, piece: { ...piece, ...newDie } });
      }
    }
  });

  return moves;
}

// サイコロの累積回転角度（グローバル変数でも、diceElement.datasetでも可）
let rotationX = 0;

function animateDiceMoveSmooth(diceElement, dx, dy, duration = 0.3) {
  return new Promise((resolve) => {
    const tileSize = 60;
    if (dx === 0 && dy === 0 || duration <= 0) {
      resolve();
      return;
    }

    const moveX = dx * tileSize;
    const moveY = dy * tileSize;

    // サイコロの回転（1マス分だけ対応）
    const rotateX = dy === -1 ? 90 : dy === 1 ? -90 : 0;
    const rotateY = dx === 1 ? 90 : dx === -1 ? -90 : 0;

    // 現在の位置と回転を取得
    const startX = parseFloat(diceElement.dataset.posX || "0");
    const startY = parseFloat(diceElement.dataset.posY || "0");
    const startRotateX = parseFloat(diceElement.dataset.rotateX || "0");
    const startRotateY = parseFloat(diceElement.dataset.rotateY || "0");

    const targetX = startX + moveX;
    const targetY = startY + moveY;
    const targetRotateX = startRotateX + rotateX;
    const targetRotateY = startRotateY + rotateY;

    diceElement.style.position = "absolute";

    const startTime = performance.now();

    function step(now) {
      const elapsed = (now - startTime) / 1000;
      const progress = Math.min(elapsed / duration, 1);

      const currentX = startX + (targetX - startX) * progress;
      const currentY = startY + (targetY - startY) * progress;
      const currentRotateX = startRotateX + (targetRotateX - startRotateX) * progress;
      const currentRotateY = startRotateY + (targetRotateY - startRotateY) * progress;

      diceElement.style.transform = `
        translate(${currentX}px, ${currentY}px)
        rotateX(${currentRotateX}deg)
        rotateY(${currentRotateY}deg)
      `;

      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        // 最終状態に固定
        diceElement.dataset.posX = targetX;
        diceElement.dataset.posY = targetY;
        diceElement.dataset.rotateX = targetRotateX;
        diceElement.dataset.rotateY = targetRotateY;

        diceElement.style.transform = `
          translate(${targetX}px, ${targetY}px)
          rotateX(${targetRotateX}deg)
          rotateY(${targetRotateY}deg)
        `;
        resolve();
      }
    }

    requestAnimationFrame(step);
  });
}

async function onCellClick(e) {
  const row = parseInt(e.currentTarget.dataset.row);
  const col = parseInt(e.currentTarget.dataset.col);
  const cell = state[row][col];
  ghostMoves = getGhostMoves(selected, row, col);
  render();

  if (!selected && cell && cell.player === currentPlayer) {
    selected = [row, col];
    ghostMoves = getGhostMoves(cell, row, col);
    render();
    board.rows[row].cells[col].classList.add("selected");
    return;
  }

  if (selected) {
    const [sr, sc] = selected;
    const piece = state[sr][sc];
    const target = state[row][col];

    // 自駒がターゲットにいたら動けない
    if (target && target.player === piece.player) {
      selected = null;
      ghostMoves = [];
      render();
      return;
    }

    const dr = row - sr;
    const dc = col - sc;
    const isStraight = (dr === 0 || dc === 0);
    const distance = Math.max(Math.abs(dr), Math.abs(dc));
    const inRange = distance <= piece.top;

    if (!isStraight || !inRange) {
      selected = null;
      ghostMoves = [];
      render();
      return;
    }

    const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
    const stepC = dc === 0 ? 0 : dc / Math.abs(dc);
    let r = sr + stepR;
    let c = sc + stepC;
    let foundEnemy = null;

    while (r !== row || c !== col) {
      const mid = state[r][c];
      if (mid) {
        if (mid.player === piece.player) {
          selected = null;
          ghostMoves = [];
          render();
          return;
        } else {
          if (foundEnemy) {
            selected = null;
            ghostMoves = [];
            render();
            return;
          }
          foundEnemy = { ...mid, row: r, col: c };
        }
      }
      r += stepR;
      c += stepC;
    }

    const dx = col - sc;
    const dy = row - sr;
    const newDie = moveDie(piece, dx, dy);

    // 条件を満たした場合だけアニメーション後に更新
    const directions = [];
    for (let i = 0; i < Math.abs(dx); i++) directions.push(dx > 0 ? "right" : "left");
    for (let i = 0; i < Math.abs(dy); i++) directions.push(dy > 0 ? "down" : "up");

    // 敵がいて取れるパターン（終点にいる場合）
    if (target) {
      if (target.player !== piece.player && piece.top < target.top) {
        await animateMoveAndUpdateState(sr, sc, directions, piece);
        state[row][col] = { ...piece, ...newDie };
        state[sr][sc] = null;
        ghostMoves = [];
        selected = null;
        recordMove(currentPlayer, [sr, sc], [row, col], piece, newDie);
        render();
        if (currentPlayer === 'white' && state[row][col]?.isKing && state[row][col]?.color === 'black') {
          applyAndShowRate("White wins!", 1);
endGame();
          return;
        }
        if (checkmate("black")) {
          setTimeout(() => {
            applyAndShowRate("White wins!", 1);
endGame();
          }, 2000);
          return;
        }
        endTurn(piece.player);
        return;
      } else {
        selected = null;
        ghostMoves = [];
        render();
        return;
      }
    }

    // 敵が途中にいて止まる条件を満たす場合
    if (foundEnemy) {
      if (piece.top < foundEnemy.top && foundEnemy.row === row && foundEnemy.col === col) {
        await animateMoveAndUpdateState(sr, sc, directions, piece);
        state[row][col] = { ...piece, ...newDie };
        state[sr][sc] = null;
        ghostMoves = [];
        selected = null;
        recordMove(currentPlayer, [sr, sc], [row, col], piece, newDie);
        render();
        if (currentPlayer === 'white' && state[row][col]?.isKing && state[row][col]?.color === 'black') {
          applyAndShowRate("White wins!", 1);
endGame();
          return;
        }
        if (checkmate("black")) {
          setTimeout(() => {
            applyAndShowRate("White wins!", 1);
endGame();
          }, 2000);
          return;
        }
        endTurn(piece.player);
        return;
      } else {
        selected = null;
        ghostMoves = [];
        render();
        return;
      }
    }

    // 通常移動
    await animateMoveAndUpdateState(sr, sc, directions, piece);
    state[row][col] = { ...piece, ...newDie };
    state[sr][sc] = null;
    recordMove(currentPlayer, [sr, sc], [row, col], piece, newDie);
    if(currentPlayer === "white" && !clockStarted){
    clockStarted = true;
    lastTime = Date.now();
    document.getElementById("player-clock").style.display="block";
document.getElementById("bot-clock").style.display="block";
    
}
    ghostMoves = [];
    selected = null;
    render();
    endTurn(piece.player);
  }
}







function hasPieceInBetween(sr, sc, row, col, board = state) {
  const dr = row - sr;
  const dc = col - sc;
  const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
  const stepC = dc === 0 ? 0 : dc / Math.abs(dc);
  let r = sr + stepR;
  let c = sc + stepC;

  while (r !== row || c !== col) {
    if (board[r][c]) {
      return { blocked: true, piece: board[r][c] };
    }
    r += stepR;
    c += stepC;
  }
  return { blocked: false, piece: null };
}

function cloneBoard(boardState) {
  return boardState.map(row => row.map(cell => cell ? { ...cell } : null));
}

function evaluateBoardDeep(board, depth, isMaximizingPlayer, perspective) {
  if (depth === 0) return evaluateBoard(board, perspective);

  const player = isMaximizingPlayer ? perspective : (perspective === "black" ? "white" : "black");
  const moves = generateMoves(player,board);

  if (moves.length === 0) {
    // 手がない → 投了
    return isMaximizingPlayer ? -Infinity : Infinity;
  }

  const scores = moves.map(move => {
    const newBoard = applyMove(cloneBoard(board), move);
    return evaluateBoardDeep(newBoard, depth - 1, !isMaximizingPlayer, perspective);
  });

  return isMaximizingPlayer ? Math.max(...scores) : Math.min(...scores);
}


function evaluateBoard(board, perspective = "black") {
  let score = 0;

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = board[r][c];
      if (piece) {
        let baseValue = 10 + piece.top;
        if (piece.isKing) baseValue += 50;
        const advanceBonus = piece.player === "black" ? (7 - r) : r;
        baseValue += advanceBonus;

        // 指定されたプレイヤーから見た評価値
        score += (piece.player === perspective) ? baseValue : -baseValue;
      }
    }
  }

  return score;
}


function hasBlockingPiece(sr, sc, er, ec, board) {
  const dr = Math.sign(er - sr);
  const dc = Math.sign(ec - sc);
  let r = sr + dr;
  let c = sc + dc;
  while (r !== er || c !== ec) {
    if (board[r][c]) return true;
    r += dr;
    c += dc;
  }
  return false;
}

function getBlockingPosition(sr, sc, dr, dc, board) {
  let r = sr + dr;
  let c = sc + dc;
  while (r >= 0 && r < 8 && c >= 0 && c < 8) {
    if (board[r][c]) return [r, c];
    r += dr;
    c += dc;
  }
  return [-1, -1];
}


function generateMoves(player, boardState) {
  const moves = [];
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = boardState[r][c];
      if (!piece || piece.player !== player) continue;
      const dirs = [[1,0],[0,1],[-1,0],[0,-1]];

      for (const [dr, dc] of dirs) {
        for (let dist = 1; dist <= piece.top; dist++) {
          const nr = r + dr * dist;
          const nc = c + dc * dist;
          if (nr < 0 || nc < 0 || nr >= 8 || nc >= 8) break;

          const target = boardState[nr][nc];

          // 中間に駒がある場合、そこが敵ならそこで止まる
          if (hasBlockingPiece(r, c, nr, nc, boardState)) {
            const [br, bc] = getBlockingPosition(r, c, dr, dc, boardState);
            const blocking = boardState[br][bc];
            if (blocking && blocking.player !== player && piece.top < blocking.top) {
              // 敵で、かつ大きい目なので取れる → moveに追加
              moves.push({ from: [r, c], to: [br, bc] });
            }
            break; // それ以降進めない
          }

          // 敵がいて取れる場合
          if (target) {
            if (target.player === player) break; // 味方 → 進めない
            if (piece.top < target.top) {
              moves.push({ from: [r, c], to: [nr, nc] });
            }
            break;
          }

          // 空きマス
          moves.push({ from: [r, c], to: [nr, nc] });
        }
      }
    }
  }
  return moves;
}



function minimax(boardState, depth, alpha, beta, maximizingPlayer) {
  const winner = checkWinner(boardState);
  if (winner === "black") return 1000;
  if (winner === "white") return -1000;

  if (depth === 0) return evaluateBoard(boardState,"black");

  const player = maximizingPlayer ? "black" : "white";
  const moves = generateMoves(player, boardState);

  if (maximizingPlayer) {
    let maxEval = -Infinity;
    for (const move of moves) {
      const newBoard = applyMove(cloneBoard(boardState), move);
      const eval = minimax(newBoard, depth - 1, alpha, beta, false);
      maxEval = Math.max(maxEval, eval);
      alpha = Math.max(alpha, eval);
      if (beta <= alpha) break; // βカット
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (const move of moves) {
      const newBoard = applyMove(cloneBoard(boardState), move);
      const eval = minimax(newBoard, depth - 1, alpha, beta, true);
      minEval = Math.min(minEval, eval);
      beta = Math.min(beta, eval);
      if (beta <= alpha) break; // αカット
    }
    return minEval;
  }
}


function applyMove(boardState, move) {
  const [fr, fc] = move.from;
  const [tr, tc] = move.to;
  const piece = boardState[fr][fc];
  const dx = tc - fc;
  const dy = tr - fr;
  const newDie = moveDie(piece, dx, dy);
  boardState[tr][tc] = { ...piece, ...newDie };
  boardState[fr][fc] = null;
  return boardState;
}

function checkWinner(boardState) {
  let hasWhiteKing = false;
  let hasBlackKing = false;
  for (let row of boardState) {
    for (let piece of row) {
      if (piece?.isKing) {
        if (piece.player === "white") hasWhiteKing = true;
        if (piece.player === "black") hasBlackKing = true;
      }
    }
  }
  if (!hasWhiteKing) return "black";
  if (!hasBlackKing) return "white";
  return null;
}

function isInCheck(color) {
  return isInCheckAfterMove(color, state);
}


function isInCheckAfterMove(color, board) {
  let kingPosition = null;

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const piece = board[row][col];
      if (piece && piece.player === color && piece.isKing) {
        kingPosition = { row, col };
        break;
      }
    }
    if (kingPosition) break;
  }

  if (!kingPosition) return true; // キングがいない＝既に取られてる

  const opponent = color === "white" ? "black" : "white";
  const oppMoves = generateMoves(opponent, board);
  for (const move of oppMoves) {
    const [tr, tc] = move.to;
    if (tr === kingPosition.row && tc === kingPosition.col) {
      return true;
    }
  }

  return false;
}

function checkmate(color) {
  if (!isInCheck(color)) return false; // まずチェックでなければ詰みでない

  const moves = generateMoves(color, state);
  for (const move of moves) {
    const newBoard = applyMove(cloneBoard(state), move);
    if (!isInCheckAfterMove(color, newBoard)) {
      return false; // 逃げ道があるなら詰みではない
    }
  }
  return true; // 全ての合法手を試してもチェック回避できなければ詰み
}
