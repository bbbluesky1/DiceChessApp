<script>
   
    const BOT = "lime";
const HUMAN = "orange";
const PV = "cyan";
    
    let humanPlayer = "white"; // or "black"
let botPlayer = "black";   // 自動
let currentPlayer = "white"; // 常に白から開始

async function startGame(side) {
  humanPlayer = side;
  // botPlayer = opponent(side); // Bot対Botなので、ここでは最初のターンの色を固定せず、runBotVsBot内で管理

  if (side === "black") {
    document.getElementById("board").style.transform = "rotate(180deg)";
  } else {
    document.getElementById("board").style.transform = "rotate(0deg)";
  }

  // ボタン無効化
  document.getElementById("whiteBtn").disabled = true;
  document.getElementById("blackBtn").disabled = true;

  // ゲーム開始
  await runBotVsBot();
}

  function showModal(message) {

  }

document.getElementById('back-button').addEventListener('click', () => {
  window.history.back();  // ひとつ前のページに戻る（ブラウザ履歴）
});


let moveHistory = []; // 棋譜保存

let currentReplayIndex = -1;
let boardStates = []; // 各局面のボード状態のスナップショット

function endGame() {
  document.getElementById("replay-controls").classList.remove("hidden");
  prepareReplayStates(); // 後述
}


function renderBoard(customState) {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const td = board.rows[r].cells[c];
      td.classList.remove("selected");
      td.innerHTML = "";

      const piece = customState[r][c];
      if (piece) {
        const dice = createDiceElement(piece);
        td.appendChild(dice);
        console.log('top:', piece.top, 'diceRotations:', diceRotations[piece.top]);
      }
    }
  }
  

  // リプレイ中はゴーストを描画しない（または必要に応じて処理を追加）
}


function createInitialBoard() {
  const initialSetup =window.state

  const board = [];

  for (let i = 0; i < 8; i++) {
    board[i] = [];
    for (let j = 0; j < 8; j++) {
      const value = initialSetup[i][j];
      const player = i < 2 ? 'black' : i > 5 ? 'white' : null;

      if (value == null || player == null) {
        board[i][j] = null;
      } else {
        const isKing = value === 2; // キングの条件が2のときだけなら
        board[i][j] = createPiece(value, player === 'white' ? '#fff' : '#222', player, isKing);
      }
    }
  }

  return board;
}


function recordMove(player, from, to, pieceBefore, pieceAfter, captured = null) {
  moveHistory.push({
    turn: moveHistory.length + 1,
    player,
    from: [from[0], from[1]], // 必ず [row, col] の配列形式にする
    to: [to[0], to[1]],       // 必ず [row, col] の配列形式にする
    pieceBefore: { top: pieceBefore.top, id: pieceBefore.id, player: pieceBefore.player, isKing: pieceBefore.isKing },
    pieceAfter: { top: pieceAfter.top, id: pieceAfter.id, player: pieceAfter.player, isKing: pieceAfter.isKing },
    captured: captured ? { top: captured.top, id: captured.id, player: captured.player, isKing: captured.isKing } : null,
  });
}


function applyMoveForReplay(board, move) {
  const { from, to, pieceAfter } = move;

  // 駒の情報を完全に復元するためにcreatePieceを使用
  // ただし、createPieceは色の指定が必要なのでpieceAfterから取得
  const color = pieceAfter.player === "white" ? "#fff" : "#222";
  const newPiece = createPiece(
    pieceAfter.top,
    color,
    pieceAfter.player,
    pieceAfter.isKing
  );

  const fromRow = from[0];
  const fromCol = from[1];
  const toRow = to[0];
  const toCol = to[1];

  board[fromRow][fromCol] = null;
  board[toRow][toCol] = newPiece;
}

function showMoveHistory() {
  console.log("=== 棋譜 ===");
  moveHistory.forEach(move => {
    const { turn, player, from, to, pieceBefore, pieceAfter, captured } = move;
    console.log(
      `${turn}. ${player}: [${from}] → [${to}] ${captured ? `(取:${captured.top})` : ""}`
    );
  });
}

// 棋譜を分析して表示する関数
function analyzeMoves() {
  const log = moveHistory.map((move, index) => {
    const from = `(${move.from[0]},${move.from[1]})`;
    const to = `(${move.to[0]},${move.to[1]})`;
    const piece = `${move.pieceBefore.player}${move.pieceBefore.top}`;
    const capture = move.captured ? ` captures ${move.captured.player}${move.captured.top}` : '';
    return `${index + 1}. ${move.player} ${piece} ${from} → ${to}${capture}`;
  }).join('\n');
  console.log("棋譜:\n" + log);
}

function prepareReplayStates() {
  // 1. 初期盤面の確定（window.initRandomBoardを最優先）
  let initialBoard = window.initRandomBoard ? JSON.parse(JSON.stringify(window.initRandomBoard)) : JSON.parse(JSON.stringify(window.state));
  
  // 2. リプレイ用の全局面状態を計算
  boardStates = [];
  let currentTempBoard = JSON.parse(JSON.stringify(initialBoard)); 
  // 0手目（初期状態）を保存
  boardStates.push(JSON.parse(JSON.stringify(currentTempBoard)));

  moveHistory.forEach((move) => {
    applyMoveForReplay(currentTempBoard, move);
    // 各手適用後の状態を保存
    boardStates.push(JSON.parse(JSON.stringify(currentTempBoard)));
  });

  // 3. リプレイの開始位置を「初期状態（インデックス0）」にセット
  currentReplayIndex = 0;
  
  // 4. 盤面を初期状態に更新して描画
  window.state = JSON.parse(JSON.stringify(boardStates[0]));
  render();

  // 5. 説明文などを更新
  showReplayMove();
}


function getMoveEvaluationMark(before, after) {
  const diff = before - after;
  if (diff >= 15) return { mark: "!!", color: "#AAF0D1" };        // パールグリーン
  if (diff >= 12) return { mark: "!",  color: "#87CEFA" };        // 青
  if (diff >= 9)  return { mark: "☆", color: "#98FB98" };         // 黄緑
  if (diff >= 6)  return { mark: "👍", color: "#98FB98" };         // 緑
  if (diff >= 3)  return { mark: "✅", color: "#90EE90" };         // 深緑
  if (diff > -3)  return { mark: "?!", color: "#FFFF99" };        // 黄色
  if (diff > -6)  return { mark: "?",  color: "#FFD580" };        // オレンジ
  if (diff > -9)  return { mark: "×",  color: "#FFB6C1" };        // 薄赤
  return              { mark: "??", color: "#FF0000" };           // 濃赤
}






 async function showReplayMove() {
  const spinner = document.getElementById("loading-spinner");
  if (spinner) spinner.style.display = "block"; 

  // 描画の競合を防ぐため少し待つ
  await new Promise(resolve => setTimeout(resolve, 10));

  const currentBoard = boardStates[currentReplayIndex];
  if (!currentBoard) {
    if (spinner) spinner.style.display = "none";
    return;
  }
  
  // 1. 盤面状態の更新と描画
  window.state = JSON.parse(JSON.stringify(currentBoard));
  render(); 

  // 2. テキスト説明の更新
  const move = moveHistory[currentReplayIndex - 1];
  const desc = move
    ? `${currentReplayIndex}. ${move.player} (${move.from[0]},${move.from[1]}) → (${move.to[0]},${move.to[1]})`
    : "初期局面";
  document.getElementById("move-description").innerText = desc;

  // 3. 評価マークと評価値の更新
  document.querySelectorAll(".eval-mark").forEach(m => m.remove());
  const prevBoard = boardStates[currentReplayIndex - 1];

  if (prevBoard && currentBoard && move) {
    const scoringPlayer = move.player; // 動かした側の視点で評価
    const beforeScore = evaluateBoard(prevBoard, scoringPlayer);
    const afterScore = evaluateBoard(currentBoard, scoringPlayer);
    const diff = afterScore - beforeScore; // 自分が得した分を計算

    const { mark, color } = getMoveEvaluationMark(beforeScore, afterScore);
    document.getElementById("evaluation").innerText = `評価値差: ${diff} ${mark}`;

    const [r, c] = move.to;
    const cell = board.rows[r].cells[c];
    if (cell) {
      const markSpan = document.createElement("span");
      markSpan.innerText = mark;
      markSpan.classList.add("eval-mark");
      markSpan.style.backgroundColor = color;
      cell.appendChild(markSpan);
    }
  } else {
    document.getElementById("evaluation").innerText = "";
  }

  if (spinner) spinner.style.display = "none"; 
}



function nextMove() {
  if (currentReplayIndex < boardStates.length - 1) {
    currentReplayIndex++;
    showReplayMove();
  }
}

function prevMove() {
  if (currentReplayIndex > 0) {
    currentReplayIndex--;
    showReplayMove();
  }
}

const board = document.getElementById("board");
//const status = document.getElementById("status");
const SIZE = 8;
let selected = null;
currentPlayer = "white";
const state = [];
window.state = state;

let diceRotations = {
  1: 'rotateX(0deg) rotateY(0deg)',
  2: 'rotateX(-90deg) rotateY(0deg)',
  3: 'rotateY(-90deg)',
  4: 'rotateY(90deg)',
  5: 'rotateX(90deg) rotateY(0deg)',
  6: 'rotateX(180deg) rotateY(0deg)'
};

const pipsMap = {
  1: [4],
  2: [0, 8],
  3: [0, 4, 8],
  4: [0, 2, 6, 8],
  5: [0, 2, 4, 6, 8],
  6: [0, 2, 3, 5, 6, 8]
};

function createPiece(top, color, player, isKing = false) {
  let die;

   switch (top) {
    case 1:
      die = { top: 1, bottom: 6, left: 4, right: 3, front: 2, back: 5 };
      break;
    case 2:
      die = { top: 2, bottom: 5, left: 4, right: 3, front: 6, back: 1 };
      break;
    case 3:
      die = { top: 3, bottom: 4, left: 6, right: 1, front: 2, back: 5 };
      break;
    case 4:
      die = { top: 4, bottom: 3, left: 1, right: 6, front: 2, back: 5 };
      break;
    case 5:
      die = { top: 5, bottom: 2, left: 4, right: 3, front: 1, back: 6 };
      break;
    case 6:
      die = { top: 6, bottom: 1, left: 4, right: 3, front: 5, back: 2 };
      break;
    default:
      throw new Error("Invalid top value");
  }

  // 黒なら左右・前後を反転
  if (player=="black") {
    [die.left, die.right] = [die.right, die.left];
    [die.front, die.back] = [die.back, die.front];
  }

  return { ...die, color, player, isKing };
}

function rollDie(die, direction) {
//console.log("rollDie呼ばれました"+ die.top);
  let newDie = { ...die };
  //console.log("roll"+newDie.top);

  switch (direction) {
    case "up":
      newDie.top = die.back;
      newDie.bottom = die.front;
      newDie.front = die.top;
      newDie.back = die.bottom;
      break;
    case "down":
      newDie.top = die.front;
      newDie.bottom = die.back;
      newDie.front = die.bottom;
      newDie.back = die.top;
      break;
    case "left":
      newDie.top = die.right;
      newDie.bottom = die.left;
      newDie.left = die.top;
      newDie.right = die.bottom;
      break;
    case "right":
      newDie.top = die.left;
      newDie.bottom = die.right;
      newDie.left = die.bottom;
      newDie.right = die.top;
      break;
  }

  return newDie;
}

function moveDie(originalDie, dx, dy) {

  let die = { ...originalDie };

  const step = (dir, count) => {
    for (let i = 0; i < count; i++) {
      die = rollDie(die, dir);
    }
  };

  if (dy < 0) step("up", -dy);
  else if (dy > 0) step("down", dy);

  if (dx < 0) step("left", -dx);
  else if (dx > 0) step("right", dx);

  return die;
}

function getGhostMoves(piece, sr, sc) {
  if (!piece) return [];

  const moves = [];
  const directions = [

    { dr: 1, dc: 0 },  // 下
    { dr: 0, dc: -1 }, // 左
    { dr: 0, dc: 1 }   // 右
  ];

  directions.forEach(({ dr, dc }) => {
    for (let i = 1; i <= piece.top; i++) {
      const r = sr + dr * i;
      const c = sc + dc * i; //
      if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) break;

      const target = window.state[r][c];
      const newDie = moveDie(piece, dc * i, dr * i);

      if (target) {
        if (target.player === piece.player) break;
            
        if (piece.top < target.top) {
          moves.push({ r, c, piece: { ...piece, ...newDie } });
        }
      
        break;
      } else {
        moves.push({ r, c, piece: { ...piece, ...newDie } });
      }
    }
  });

  return moves;
}

function animateDiceMoveSmooth(diceElement, dx, dy, duration = 0.2) {
  return new Promise((resolve) => {
    // 画面上の実際の1マスのサイズ（ピクセル数）を正確に取得
    const td = diceElement.closest("td");
    const tileSize = td ? td.offsetWidth : 60; 

    if ((dx === 0 && dy === 0) || duration <= 0) {
      resolve();
      return;
    }

    const moveX = dx * tileSize;
    const moveY = dy * tileSize;

    const startX = parseFloat(diceElement.dataset.posX || "0");
    const startY = parseFloat(diceElement.dataset.posY || "0");

    const targetX = startX + moveX;
    const targetY = startY + moveY;

    // 現在の出目の3D回転をそのままキープする
    const currentRotation = diceElement.style.transform.replace(/translate\(.*?\)/g, "").trim();

    diceElement.style.position = "absolute";
    const startTime = performance.now();

    function step(now) {
      const elapsed = (now - startTime) / 1000;
      const progress = Math.min(elapsed / duration, 1);

      const currentX = startX + (targetX - startX) * progress;
      const currentY = startY + (targetY - startY) * progress;

      // 位置だけを動かし、回転は維持
      diceElement.style.transform = `translate(${currentX}px, ${currentY}px) ${currentRotation}`;

      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        diceElement.dataset.posX = targetX;
        diceElement.dataset.posY = targetY;
        diceElement.style.transform = `translate(${targetX}px, ${targetY}px) ${currentRotation}`;
        resolve();
      }
    }
    requestAnimationFrame(step);
  });
}

async function onCellClick(e) {
  const row = parseInt(e.currentTarget.dataset.row);
  const col = parseInt(e.currentTarget.dataset.col);
  const cell = window.state[row][col];
  ghostMoves = getGhostMoves(selected, row, col);
  render();

  if (!selected && cell && cell.player === currentPlayer) {
    selected = [row, col];
    ghostMoves = getGhostMoves(cell, row, col);
    render();
    board.rows[row].cells[col].classList.add("selected");
    return;
  }

  if (selected) {
    const [sr, sc] = selected;
    const piece = window.state[sr][sc];
    const target = window.state[row][col];

    // 自駒がターゲットにいたら動けない
    if (target && target.player === piece.player) {
      selected = null;
      ghostMoves = [];
      render();
      return;
    }

    const dr = row - sr;
    const dc = col - sc;
    const isStraight = (dr === 0 || dc === 0);
    const distance = Math.max(Math.abs(dr), Math.abs(dc));
    const inRange = distance <= piece.top;

    if (!isStraight || !inRange) {
      selected = null;
      ghostMoves = [];
      render();
      return;
    }

    const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
    const stepC = dc === 0 ? 0 : dc / Math.abs(dc);
    let r = sr + stepR;
    let c = sc + stepC;
    let foundEnemy = null;

    while (r !== row || c !== col) {
      const mid = window.state[r][c];
      if (mid) {
        if (mid.player === piece.player) {
          selected = null;
          ghostMoves = [];
          render();
          return;
        } else {
          if (foundEnemy) {
            selected = null;
            ghostMoves = [];
            render();
            return;
          }
          foundEnemy = { ...mid, row: r, col: c };
        }
      }
      r += stepR;
      c += stepC;
    }

    const dx = col - sc;
    const dy = row - sr;
    const newDie = moveDie(piece, dx, dy);

    // 条件を満たした場合だけアニメーション後に更新
    const directions = [];
    for (let i = 0; i < Math.abs(dx); i++) directions.push(dx > 0 ? "right" : "left");
    for (let i = 0; i < Math.abs(dy); i++) directions.push(dy > 0 ? "down" : "up");

    // 敵がいて取れるパターン（終点にいる場合）
    if (target) {
      if (target.player !== piece.player && piece.top < target.top) {
        const captured = JSON.parse(JSON.stringify(target));
        await animateMoveAndUpdateState(sr, sc, directions, piece);
        window.state[row][col] = { ...piece, ...newDie };
        window.state[sr][sc] = null;
        ghostMoves = [];
        selected = null;
        recordMove(currentPlayer, [sr, sc], [row, col], piece, newDie, captured);
        render();
        if (currentPlayer === 'white' && window.state[row][col]?.isKing && window.state[row][col]?.player=== 'black') {
          showModal("White wins!");
          endGame();
          return;
        }
        if (checkmate("black")) {
          setTimeout(() => {
            showModal("White wins!");
            endGame();
          }, 2000);
          return;
        }
        
        if (currentPlayer === 'black' && window.state[row][col]?.isKing && window.state[row][col]?.player === 'white') {
          showModal("black wins!");
          endGame();
          return;
        }
        if (checkmate("white")) {
          setTimeout(() => {
            showModal("black wins!");
            endGame();
          }, 2000);
          return;
        }
        
        
        //(piece.player);
        return;
      } else {
        selected = null;
        ghostMoves = [];
        render();
        return;
      }
    }

    // 敵が途中にいて止まる条件を満たす場合
    if (foundEnemy) {
      if (piece.top < foundEnemy.top && foundEnemy.row === row && foundEnemy.col === col) {
        const captured = JSON.parse(JSON.stringify(foundEnemy));
        await animateMoveAndUpdateState(sr, sc, directions, piece);
        window.state[row][col] = { ...piece, ...newDie };
        window.state[sr][sc] = null;
        ghostMoves = [];
        selected = null;
        recordMove(currentPlayer, [sr, sc], [row, col], piece, newDie, captured);
        render();
        if (currentPlayer === 'white' && window.state[row][col]?.isKing && window.state[row][col]?.player === 'black') {
          showModal("White wins!");
          endGame();
          return;
        }
        if (checkmate("black")) {
          setTimeout(() => {
            showModal("White wins!");
            endGame();
          }, 2000);
          return;
        }
        //(piece.player);
        return;
      } else {
        selected = null;
        ghostMoves = [];
        render();
        return;
      }
    }

    // 通常移動
    await animateMoveAndUpdateState(sr, sc, directions, piece);
    window.state[row][col] = { ...piece, ...newDie };
    window.state[sr][sc] = null;
    recordMove(currentPlayer, [sr, sc], [row, col], piece, newDie, null);
    ghostMoves = [];
    selected = null;
    render();
    //(piece.player);
  }
}







function hasPieceInBetween(sr, sc, row, col, board = window.state) {
  const dr = row - sr;
  const dc = col - sc;
  const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
  const stepC = dc === 0 ? 0 : dc / Math.abs(dc);
  let r = sr + stepR;
  let c = sc + stepC;

  while (r !== row || c !== col) {
    if (board[r][c]) {
      return { blocked: true, piece: board[r][c] };
    }
    r += stepR;
    c += stepC;
  }
  return { blocked: false, piece: null };
}

function evaluateBoardDeep(board, depth, isMaximizingPlayer, perspective) {
  if (depth === 0) return evaluateBoard(board, perspective);

  const player = isMaximizingPlayer ? perspective : (perspective === "black" ? "white" : "black");
  const moves = generateMoves(player,board);

  if (moves.length === 0) {
    // 手がない → 投了
    return isMaximizingPlayer ? -Infinity : Infinity;
  }

  const scores = moves.map(move => {
    const newBoard = JSON.parse(JSON.stringify(window.state));
applyMovepure(newBoard, move);
    return evaluateBoardDeep(newBoard, depth - 1, !isMaximizingPlayer, perspective);
  });

  return isMaximizingPlayer ? Math.max(...scores) : Math.min(...scores);
}


function kingInDanger(board, color) {

  for (const move of enemyMoves) {

const positionHistory = [];

function repetitionCount(board) {

function evaluateBoard(board, perspective) {

  let score = 0;

  if (kingInDanger(board, perspective)) {
    score -= 5000;
  }

  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

  const enemy = perspective === "white" ? "black" : "white";
  const enemyPieces = countPieces(board, enemy);
  const endgame = enemyPieces <= 7;

  // -------------------------
  // ① ピース評価
  // -------------------------
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {

      const piece = board[r][c];
      if (!piece) continue;

      let value = 100;

      if (piece.isKing) {
        value += 10000;
        if (piece.top === 1) value += 3000;
      }

      let mobility = 0;
      let attackBonus = 0;
      let defenseBonus = 0;

      // 機動力と攻撃・防御の利きの評価
      for (const [dr, dc] of dirs) {
        for (let dist = 1; dist <= piece.top; dist++) {

          const nr = r + dr * dist;
          const nc = c + dc * dist;

          if (nr < 0 || nc < 0 || nr >= 8 || nc >= 8) break;

          const target = board[nr][nc];

          if (!target) {
            mobility += 1;
          } else {
            if (target.player !== piece.player) {
              // 敵の駒への利き（攻撃）
              attackBonus += (10 + target.top) * 0.4;
            } else {
              // 味方の駒への利き（防御/保護）
              if (endgame) {
                defenseBonus += 15; // エンドゲーム時は味方の保護を高く評価
              }
            }
            break;
          }
        }
      }

      value += mobility * 0.5;
      value += attackBonus * 2 * (mobility > 0 ? 0.7 : 0.3);
      value += defenseBonus;

      const forward = (piece.player === "white") ? (7 - r) : r;
      value += forward * 0.2;
      if (!endgame) {
        value += evaluatePiece(piece, r, c, perspective);
      };
      if (piece.player === perspective) {
        score += value;
      } else {
        score -= value;
      }
    }
  }

  // -------------------------
  // ② 中盤評価（dice系）
  // -------------------------
  if (!endgame) {
    score += evaluateForks(board, perspective);
    score -= evaluateForks(board, enemy);

    score += evaluatePieceCount(board, perspective);
    score -= evaluatePieceCount(board, enemy);
  }

  // -------------------------
  // ③ メイト評価
  // -------------------------
  if (checkmate(enemy, board)) {
    score += 10000;
  }

  // -------------------------
  // ④ エンドゲーム評価
  // -------------------------
  if (endgame) {

    const kp = kingPos(board, enemy);

    if (kp) {
      const [kr, kc] = kp;
      const dist = cornerDistance(kr, kc);
      score += (10 - dist) * 2000;
    }

    const enemyKingMoves = generateMoves(enemy, board).length;
    score += (5 - enemyKingMoves) * 3000;
  }

  return score;
}


function countPieces(board, player) {
  let count = 0;

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = board[r][c];

      if (piece && piece.player === player) {
        count++;
      }
    }
  }

  return count;
}

 
 function kingPos(board, color) {
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = board[r][c];
      if (p?.isKing && p.player === color) return [r, c];
    }
  }
  return null;
}

function cornerDistance(r, c) {
  const corners = [
    [0,0], [0,7], [7,0], [7,7]
  ];

  return Math.min(...corners.map(([cr, cc]) =>
    Math.abs(r - cr) + Math.abs(c - cc)
  ));
}

function evaluateForks(board, player) {
  let score = 0;

  const dirs = [
    [1, 0],
    [-1, 0],
    [0, 1],
    [0, -1]
  ];

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {

      const piece = board[r][c];

      if (!piece || piece.player !== player)
        continue;

      let forkTargets = 0;

      for (const [dr, dc] of dirs) {

        for (let dist = 1; dist <= piece.top; dist++) {

          const nr = r + dr * dist;
          const nc = c + dc * dist;

          if (
            nr < 0 || nr >= 8 ||
            nc < 0 || nc >= 8
          ) {
            break;
          }

          const target = board[nr][nc];

          if (!target)
            continue;

          if (
            target.player !== player &&
            piece.top < target.top
          ) {
            forkTargets++;
          }

          break;
        }
      }

      if (forkTargets >= 2) {
        score += 100;
      }
    }
  }

  return score;
}


function hasBlockingPiece(sr, sc, er, ec, board) {
  const dr = Math.sign(er - sr);
  const dc = Math.sign(ec - sc);
  let r = sr + dr;
  let c = sc + dc;
  while (r !== er || c !== ec) {
    if (board[r][c]) return true;
    r += dr;
    c += dc;
  }
  return false;
}

function getBlockingPosition(sr, sc, dr, dc, board) {
  let r = sr + dr;
  let c = sc + dc;
  while (r >= 0 && r < 8 && c >= 0 && c < 8) {
    if (board[r][c]) return [r, c];
    r += dr;
    c += dc;
  }
  return [-1, -1];
}

function applyMovePure(board, move) {
  const newBoard = cloneBoard(board);

  const fr = move.from[0];
  const fc = move.from[1];
  const tr = move.to[0];
  const tc = move.to[1];

  const piece = newBoard[fr][fc];

  const dx = tc - fc;
  const dy = tr - fr;

  // ★ここが本体
  const newDie = moveDie(piece, dx, dy);

  newBoard[fr][fc] = null;
  newBoard[tr][tc] = {
    ...piece,
    ...newDie // ← top含め全部更新
  };

  return newBoard;
}


function generateMoves(player, boardState) {
  const moves = [];
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = boardState[r][c];
      if (!piece || piece.player !== player) continue;
      const dirs = [[1,0],[0,1],[-1,0],[0,-1]];

      for (const [dr, dc] of dirs) {
        for (let dist = 1; dist <= piece.top; dist++) {
          const nr = r + dr * dist;
          const nc = c + dc * dist;
          if (nr < 0 || nc < 0 || nr >= 8 || nc >= 8) break;

          const target = boardState[nr][nc];

          // 中間に駒がある場合、そこが敵ならそこで止まる
          if (hasBlockingPiece(r, c, nr, nc, boardState)) {
            const [br, bc] = getBlockingPosition(r, c, dr, dc, boardState);
            const blocking = boardState[br][bc];
            if (blocking && blocking.player !== player && piece.top < blocking.top) {
              // 敵で、かつ大きい目なので取れる → moveに追加
              moves.push({ from: [r, c], to: [br, bc] });
            }
            break; // それ以降進めない
          }

          // 敵がいて取れる場合
          if (target) {
            if (target.player === player) break; // 味方 → 進めない
            if (piece.top < target.top) {
              moves.push({ from: [r, c], to: [nr, nc] });
            }
            break;
          }
          
         
   // 空きマス
          moves.push({ from: [r, c], to: [nr, nc] });
 
  
        
        }
      }
    }
  }
  return moves;
}

let moveStack = [];

function makeMove(board, move) {
  const [fr, fc] = move.from;
  const [tr, tc] = move.to;

  const piece = board[fr][fc];

  const captured = board[tr][tc]; // 追加

  const dx = tc - fc;
  const dy = tr - fr;

  const oldKey = `${piece.player}${piece.top}`;

  // Zobrist remove from
  currentHash ^= ZOBRIST[fr][fc][oldKey];

  const newDie = moveDie(piece, dx, dy);
  const newPiece = { ...piece, ...newDie };
  const newKey = `${newPiece.player}${newPiece.top}`;

  board[tr][tc] = newPiece;
  board[fr][fc] = null;

  // Zobrist add to
  currentHash ^= ZOBRIST[tr][tc][newKey];

  // ★★★ここ重要★★★
  moveStack.push({
    from: [fr, fc],
    to: [tr, tc],
    movedPiece: piece,
    captured
  });

  return board;
}

function undoMove(board) {
  const last = moveStack.pop();
  if (!last) return;

  const [fr, fc] = last.from;
  const [tr, tc] = last.to;

  const moved = last.movedPiece;
  const movedKey = `${moved.plwindow.stateayer}${moved.top}`;

  // remove destination
  currentHash ^= ZOBRIST[tr][tc][movedKey];

  board[fr][fc] = moved;

  if (last.captured) {
    board[tr][tc] = last.captured;
    const capKey = `${last.captured.player}${last.captured.top}`;
    currentHash ^= ZOBRIST[tr][tc][capKey];
  } else {
    board[tr][tc] = null;
  }

  // add back origin
  currentHash ^= ZOBRIST[fr][fc][movedKey];
}

const ZOBRIST = [];
const PLAYERS = ["white", "black"];

function initZobrist() {
  for (let r = 0; r < 8; r++) {
    ZOBRIST[r] = [];
    for (let c = 0; c < 8; c++) {
      ZOBRIST[r][c] = {};
      for (const p of PLAYERS) {
        ZOBRIST[r][c][p] = {};
        for (let top = 1; top <= 6; top++) {
          ZOBRIST[r][c][p][top] = random32();
        }
      }
    }
  }
}


function random32() {
  return (Math.random() * 0xFFFFFFFF) >>> 0;
}


let currentHash = 0;

function computeHash(board) {
  let h = 0;

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = board[r][c];
      if (!p) continue;

      h ^= ZOBRIST[r][c][p.player][p.top];
    }
  }

  return h;
}

function getWinner(board) {

    for (let c = 0; c < 8; c++) {
      const p = board[r][c];

function minimax(board, depth, alpha, beta, maximizing, botColor) {

if (repetitionCount(board) >= 2){
return -1;
};

const winner = getWinner(board);


  if (winner === botColor) {
    return {
      score: 100000000000000000,
      line: []
    };
  }

  if (winner === opponent(botColor)) {
    return {
      score: -100000000000000000,
      line: []
    };
  }

  const moves = generateMoves(maximizing ? botColor : opponent(botColor), board);

  if (depth === 0 || moves.length === 0) {
    return {
      score: evaluateBoard(board, botColor),
      line: []
    };
  }

  orderMoves(moves, board, botColor);

  let bestLine = [];

  if (maximizing) {
    let maxEval = -Infinity;

    for (const move of moves) {

     const newBoard = applyMovePure(board, move);


      const result = minimax(
        newBoard,
        depth - 1,
        alpha,
        beta,
        false,
        botColor
      );

      if (result.score > maxEval) {
        maxEval = result.score;
        bestLine = [move, ...result.line];
      }

      alpha = Math.max(alpha, result.score);
      if (beta <= alpha) break;
    }

    return {
      score: maxEval,
      line: bestLine
    };
  }

  else {
    let minEval = Infinity;

    for (const move of moves) {

      const newBoard = applyMovePure(board, move);

      const result = minimax(
        newBoard,
        depth - 1,
        alpha,
        beta,
        true,
        botColor
      );

      if (result.score < minEval) {
        minEval = result.score;
        bestLine = [move, ...result.line];
      }

      beta = Math.min(beta, result.score);
      if (beta <= alpha) break;
    }

    return {
      score: minEval,
      line: bestLine
    };
  }
}

function isInCheckAfterMove(color, board) {
  let kingPosition = null;

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const piece = board[row][col];
      if (piece && piece.player === color && piece.isKing) {
        kingPosition = { row, col };
        break;
      }
    }
    if (kingPosition) break;
  }

  if (!kingPosition) return true; // キングがいない＝既に取られてる

  const opponent = color === "white" ? "black" : "white";
  const oppMoves = generateMoves(opponent, board);
  for (const move of oppMoves) {
    const [tr, tc] = move.to;
    if (tr === kingPosition.row && tc === kingPosition.col) {
      return true;
    }
  }

  return false;
}

applyMove(newBoard, move);

async function runBotVsBot(maxTurns = 200) {
  // 初期手番の設定（白から開始）
  botPlayer = "white";
  currentPlayer = "white";

  for (let turn = 0; turn < maxTurns; turn++) {
    // 0. 手番側が既に詰んでいるかチェック（初期盤面対応）
    if (checkmate(botPlayer)) {
      console.log(`${opponent(botPlayer)} の勝ち！`);
      showModal(`${opponent(botPlayer).charAt(0).toUpperCase() + opponent(botPlayer).slice(1)} wins!`);
      endGame();
      return 0;
    }

    // 1. Botが1手指す
    let result = await botTurn(); 
    if (result === 0) return 0;
    
    // 2. 手番を交代する
    botPlayer = opponent(botPlayer);
    currentPlayer = botPlayer;

    await sleep(500); 
  }
  return 0;
}


function createFullPiece(topValue, player, isKing = false) {
  // 上面（top）に応じて、前後左右底の目を標準的な配置で定義
  // (対面を足すと必ず7になる組み合わせ)
  const sides = {
    1: { bottom: 6, front: 2, back: 5, left: 3, right: 4 },
    2: { bottom: 5, front: 6, back: 1, left: 3, right: 4 },
    3: { bottom: 4, front: 2, back: 5, left: 6, right: 1 },
    4: { bottom: 3, front: 2, back: 5, left: 1, right: 6 },
    5: { bottom: 2, front: 1, back: 6, left: 3, right: 4 },
    6: { bottom: 1, front: 5, back: 2, left: 3, right: 4 }
  };

  const sideConfig = sides[topValue] || sides[1];

  return {
    top: topValue,
    bottom: sideConfig.bottom,
    front: sideConfig.front,
    back: sideConfig.back,
    left: sideConfig.left,
    right: sideConfig.right,
    player: player,
    isKing: isKing
  };
}

function createRandomEndgameState() {
  const SIZE = 8;
  
  while (true) {
    const tempBoard = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));

    let whiteCount = 0;
    let blackCount = 0;

    function placePiece(player) {
      while (true) {
        const r = Math.floor(Math.random() * 8);
        const c = Math.floor(Math.random() * 8);

        // キングの確定位置には置かない
        if ((r === 0 && c === 0) || (r === 7 && c === 7)) continue;
        if (tempBoard[r][c]) continue;

        const randomTop = Math.floor(Math.random() * 6) + 1;
        const piece = createFullPiece(randomTop, player, false);

        tempBoard[r][c] = piece;
        return true;
      }
    }

    // 白最大5個
    while (whiteCount < 5) {
      placePiece("white");
      whiteCount++;
    }

    // 黒最大1個
    while (blackCount < 1) {
      placePiece("black");
      blackCount++;
    }

    // キングを確定位置に入れる
    tempBoard[0][0] = createFullPiece(1, "white", true);
    tempBoard[7][7] = createFullPiece(6, "black", true);

    // 一時的に現在の状態を全体に同期
    window.state = tempBoard;

    const savedPlayer = currentPlayer;

    // 1. そもそも配置した瞬間時点で詰んでいるかチェック
    currentPlayer = "white";
    const isWhiteMatedDirect = checkmate("white");
    currentPlayer = "black";
    const isBlackMatedDirect = checkmate("black");

    if (isWhiteMatedDirect || isBlackMatedDirect) {
      currentPlayer = savedPlayer;
      continue; // 即やり直し
    }

    // 2. ★1手目が動いてしまうバグを確実に仕留める判定★
    // 「白が次に1手動かしただけで、黒が即座に詰んで終わってしまう」ような
    // 1手で勝負が決まる超クソ盤面をシミュレーションで事前に弾きます。
    currentPlayer = "white";
    let isInstantWinForWhite = false;
    
    // 白のすべての合法手を調べる
    if (typeof generateMoves === "function") {
      const moves = generateMoves("white", tempBoard);
      for (const m of moves) {
        // 仮想的に1手動かしてみる
        const testBoard = JSON.parse(JSON.stringify(tempBoard));
        const [sr, sc] = m.from;
        const [dr, dc] = m.to;
        testBoard[dr][dc] = testBoard[sr][sc];
        testBoard[sr][sc] = null;
        
        // その状態で黒が詰むかチェック
        window.state = testBoard;
        currentPlayer = "black";
        if (checkmate("black")) {
          isInstantWinForWhite = true;
          break;
        }
      }
    }

    // 元の状態に戻す
    window.state = tempBoard;
    currentPlayer = savedPlayer;

    // 1手で即死する盤面だったら、呼び出し元に渡す前にここでボツにして作り直す
    if (isInstantWinForWhite) {
      console.log("1手で即死する盤面を検知したため、動かされる前にスキップします。");
      continue; 
    }

    // どちらも即死しない健全なエンドゲーム盤面のみを確定して返す
    // ★ここでディープコピーして保存
    window.initRandomBoard = JSON.parse(JSON.stringify(tempBoard));
    
    const resultElem = document.getElementById("game-result");
    if (resultElem) resultElem.innerText = "";
    
    return tempBoard;
  }
}


function renderFromState(state) {
  // 既存UIをクリア
  board.innerHTML = "";

  for (let r = 0; r < state.length; r++) {
    const tr = document.createElement("tr");

    for (let c = 0; c < state[r].length; c++) {
      const td = document.createElement("td");

      td.dataset.row = r;
      td.dataset.col = c;

      // 見た目（チェス盤パターン）
      td.className = (r + c) % 2 === 0 ? "white" : "black";

      // もしstateに値があるなら表示（任意）
      if (state[r][c] !== null && state[r][c] !== undefined) {
        td.textContent = state[r][c];
      }

      td.addEventListener("click", onCellClick);
      tr.appendChild(td);
    }

    board.appendChild(tr);
  }
}

window.state = createRandomEndgameState();

renderFromState(window.state);
render();
